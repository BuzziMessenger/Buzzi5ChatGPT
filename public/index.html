<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Buzzi Messenger</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e9eff5;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #2f80ed;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      background: white;
      padding: 8px 12px;
      margin: 5px;
      border-radius: 8px;
      max-width: 60%;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #fff;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      background: #2f80ed;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>Buzzi Messenger 💬</header>

<div id="chat"></div>

<div class="input-area">
  <input id="msgInput" placeholder="Typ een bericht..." />
  <button onclick="sendMessage()">Send</button>
</div>

<!-- 🔥 SOCKET.IO CLIENT (BELANGRIJK) -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
  // 🔌 connect met jouw Render backend
  const socket = io("https://buzzimessenger.onrender.com");

  const chat = document.getElementById("chat");
  const input = document.getElementById("msgInput");

  // ontvangen berichten
  socket.on("receive_message", (msg) => {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerText = msg.from + ": " + msg.text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  });

  // verzenden
  function sendMessage() {
    const text = input.value;
    if (!text) return;

    socket.emit("send_message", {
      from: "User",
      to: "all",
      text: text
    });

    input.value = "";
  }
</script>

</body>
</html>
