<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buzzi Messenger</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2b579a">

<style>

body{margin:0;font-family:Segoe UI;background:#d7e7ff;height:100vh;overflow:hidden}

/* SPLASH */
#splash{
  position:fixed;inset:0;
  background:#2b579a;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  z-index:999;
}

/* AUTH */
#auth{display:none;position:fixed;inset:0;background:#1f3f73;justify-content:center;align-items:center}
.card{background:white;padding:20px;border-radius:12px;width:320px}

/* APP */
.app{display:none;height:100vh;display:flex}

.sidebar{width:250px;background:#f5f8ff;border-right:1px solid #ccc}
.header{background:#2b579a;color:white;padding:10px}

.user{display:flex;align-items:center;padding:10px;cursor:pointer;margin:5px;background:white;border-radius:10px}

.dot{width:8px;height:8px;border-radius:50%;margin-left:auto}
.online{background:green}
.offline{background:gray}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column}

.box{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:6px}

.msg{padding:10px;border-radius:10px;max-width:70%}
.me{background:#cfe6ff;align-self:flex-end}
.other{background:white}

.input{display:flex;padding:10px;background:white}

.input input{flex:1;padding:10px;border-radius:20px}

.input button{width:110px;margin-left:10px}

/* SETTINGS */
#settingsPanel{
  position:fixed;top:50px;right:10px;
  background:white;padding:10px;border-radius:10px;
  display:none
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1>💬 Buzzi Messenger</h1>
</div>

<!-- AUTH -->
<div id="auth">
  <div class="card">
    <h3>Login / Register</h3>
    <input id="user" placeholder="username">
    <input id="pass" type="password" placeholder="password">

    <select id="mode">
      <option value="login">Login</option>
      <option value="register">Register</option>
    </select>

    <button onclick="auth()">Versturen</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settingsPanel">
  <input type="file" id="avatarInput">
  <button onclick="saveAvatar()">Opslaan</button>
</div>

<button onclick="toggleSettings()" style="position:fixed;top:10px;right:10px">⚙</button>

<!-- APP -->
<div class="app" id="app">

  <div class="sidebar">
    <div class="header">Contacten</div>
    <div id="users"></div>
  </div>

  <div class="chat">

    <div class="header" id="chatTitle">Selecteer chat</div>

    <div class="box" id="box"></div>

    <div class="input">
      <input id="msg" oninput="typing()" placeholder="Typ bericht...">
      <button onclick="send()">Versturen</button>
    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://buzzimessenger.onrender.com");

let me=null;
let active=null;
let typingTimeout;

/* SOUND */
const sound = new Audio("https://actions.google.com/sounds/v1/notifications/pling.ogg");

/* SPLASH */
setTimeout(()=>{
  splash.style.display="none";
  auth.style.display="flex";
},1500);

/* AUTH */
function auth(){
  socket.emit("register",{
    user:user.value,
    pass:pass.value,
    mode:mode.value
  });
}

socket.on("login_success",(u)=>{
  me=u.username;
  auth.style.display="none";
  app.style.display="flex";
  enablePush();
});

/* USERS */
socket.on("users",users=>{
  usersBox.innerHTML="";

  users.forEach(u=>{

    if(!u?.username || u.username===me) return;

    const saved = localStorage.getItem("avatar_"+u.username);

    const avatar = saved
      ? `<img src="${saved}" style="width:28px;height:28px;border-radius:50%">`
      : `<div style="width:28px;height:28px;border-radius:50%;background:#2b579a;color:white;display:flex;align-items:center;justify-content:center">${u.username[0]}</div>`;

    const d=document.createElement("div");
    d.className="user";

    d.innerHTML=`
      ${avatar}
      <span style="margin-left:8px">${u.username}</span>
      <div class="dot ${u.status}"></div>
    `;

    d.onclick=()=>{
      active=u.username;
      socket.emit("get_history",{userA:me,userB:active});
      chatTitle.innerText="Chat met "+active;
    };

    usersBox.appendChild(d);
  });
});

/* CHAT */
socket.on("chat_message",(m)=>{
  sound.play();

  if(Notification.permission==="granted"){
    new Notification("Buzzi", { body: m.text });
  }

  if(active){
    socket.emit("get_history",{userA:me,userB:active});
  }
});

socket.on("history",render);

/* SEND */
function send(){
  if(!msg.value||!active) return;

  socket.emit("chat_message",{
    from:me,
    to:active,
    text:msg.value,
    time:Date.now()
  });

  msg.value="";
}

/* TYPING */
function typing(){
  socket.emit("typing",{from:me,to:active});
  clearTimeout(typingTimeout);
  typingTimeout=setTimeout(()=>{
    socket.emit("stop_typing",{from:me,to:active});
  },600);
}

/* RENDER */
function render(msgs){
  box.innerHTML="";

  msgs.forEach(m=>{
    const d=document.createElement("div");
    d.className="msg "+(m.from===me?"me":"other");
    d.innerText=m.text;
    box.appendChild(d);
  });

  box.scrollTop=box.scrollHeight;
}

/* SETTINGS */
function toggleSettings(){
  settingsPanel.style.display =
    settingsPanel.style.display==="block"?"none":"block";
}

function saveAvatar(){
  const file = avatarInput.files[0];
  if(!file) return;

  const r = new FileReader();
  r.onload = e=>{
    localStorage.setItem("avatar_"+me, e.target.result);
    alert("Opgeslagen");
  };
  r.readAsDataURL(file);
}

/* PUSH */
async function enablePush(){
  if("Notification" in window){
    await Notification.requestPermission();
  }
}

</script>

</body>
</html>
