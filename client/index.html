<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover"
>

<link rel="icon" href="data:,">

<title>Buzzi Messenger</title>

<style>

/* ====================================
   BASIS
==================================== */

html,
body{

  margin:0;
  padding:0;

  width:100%;
  height:100%;

  overflow:hidden;

  font-family:Segoe UI;

  background:#dfe9f7;

}

*{
  box-sizing:border-box;
}

.dark{
  background:#1e1e1e;
  color:white;
}

/* ====================================
   SPLASH
==================================== */

#splash{

  position:fixed;
  inset:0;

  background:#2b579a;

  color:white;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  z-index:9999;

}

/* ====================================
   LOGIN
==================================== */

#auth{

  display:none;

  justify-content:center;
  align-items:center;

  height:100dvh;

}

.card{

  width:340px;

  background:white;

  border-radius:18px;

  padding:22px;

  box-shadow:0 0 25px rgba(0,0,0,0.2);

}

.card input,
.card select,
.card button{

  width:100%;

  padding:14px;

  margin-top:10px;

  border-radius:12px;

  border:1px solid #ccc;

  font-size:15px;

}

/* ====================================
   APP
==================================== */

#app{

  display:none;

  width:100%;
  height:100dvh;

  overflow:hidden;

}

/* ====================================
   SIDEBAR
==================================== */

.sidebar{

  width:290px;

  background:#f5f7ff;

  border-right:1px solid #ddd;

  overflow-y:auto;

  height:100dvh;

}

.user{

  display:flex;
  align-items:center;
  gap:12px;

  padding:12px;

  margin:8px;

  background:white;

  border-radius:14px;

  cursor:pointer;

  transition:.2s;

}

.user:hover{
  background:#e7eeff;
}

.avatar{

  width:46px;
  height:46px;

  border-radius:50%;

}

/* ====================================
   ONLINE DOT
==================================== */

.online-dot{

  width:10px;
  height:10px;

  border-radius:50%;

  background:#35d04d;

  display:inline-block;

  margin-left:6px;

}

/* ====================================
   CHAT
==================================== */

.chat{

  flex:1;

  display:flex;
  flex-direction:column;

  min-height:0;

  height:100dvh;

}

.header{

  background:#2b579a;

  color:white;

  padding:14px;

  display:flex;
  justify-content:space-between;
  align-items:center;

}

/* ====================================
   MESSAGES
==================================== */

.messages{

  flex:1;

  overflow-y:auto;

  padding:14px;

  display:flex;
  flex-direction:column;

  gap:10px;

}

/* ====================================
   BUBBLES
==================================== */

.msg{

  max-width:75%;

  padding:12px;

  border-radius:18px;

  animation:fade .2s ease;

  word-break:break-word;

}

.me{

  align-self:flex-end;

  background:#c9f7c2;

}

.other{

  background:white;

}

.meta{

  margin-top:5px;

  font-size:11px;

  opacity:.7;

}

/* ====================================
   INPUT
==================================== */

.input{

  display:flex;

  gap:10px;

  padding:10px;

  background:white;

}

.input input{

  flex:1;

  padding:14px;

  border-radius:14px;

  border:1px solid #ccc;

  font-size:16px;

}

/* ====================================
   SETTINGS
==================================== */

#settings{

  display:none;

  position:fixed;

  right:10px;
  top:60px;

  width:280px;

  max-height:80vh;

  overflow-y:auto;

  background:white;

  border-radius:16px;

  padding:16px;

  z-index:999;

  box-shadow:0 0 20px rgba(0,0,0,0.25);

}

.avatar-grid{

  display:flex;
  flex-wrap:wrap;
  gap:10px;

}

/* ====================================
   EMOJI PICKER
==================================== */

#emojiPicker{

  display:none;

  position:absolute;

  bottom:80px;

  left:10px;

  background:white;

  border-radius:14px;

  padding:10px;

  width:250px;

  box-shadow:0 0 15px rgba(0,0,0,0.2);

}

.emoji{

  font-size:24px;

  cursor:pointer;

  padding:5px;

  display:inline-block;

}

/* ====================================
   MOBILE
==================================== */

@media(max-width:768px){

  #app{

    flex-direction:column;

  }

  .sidebar{

    width:100%;

    height:220px;

    overflow-y:auto;

    border-right:none;

    border-bottom:1px solid #ddd;

  }

  .chat{

    height:calc(100dvh - 220px);

  }

  .msg{

    max-width:88%;

  }

}

/* ====================================
   ANIMATIE
==================================== */

@keyframes fade{

  from{
    opacity:0;
    transform:translateY(6px);
  }

  to{
    opacity:1;
    transform:none;
  }

}

</style>
</head>

<body>

<!-- SPLASH -->

<div id="splash">

  <h1>Buzzi Messenger</h1>

  <p>Buzzi Messenger is aan het laden...</p>

</div>

<!-- LOGIN -->

<div id="auth">

  <div class="card">

    <h2>Buzzi Messenger</h2>

    <input
      id="user"
      placeholder="Gebruikersnaam"
    >

    <input
      id="pass"
      type="password"
      placeholder="Wachtwoord"
    >

    <select id="mode">

      <option value="login">
        Inloggen
      </option>

      <option value="register">
        Registreren
      </option>

    </select>

    <button onclick="login()">
      Start
    </button>

    <div id="error"></div>

  </div>

</div>

<!-- APP -->

<div
id="app"
style="display:flex"
>

  <!-- CONTACTEN -->

  <div class="sidebar">

    <div id="users"></div>

  </div>

  <!-- CHAT -->

  <div class="chat">

    <div class="header">

      <span id="chatTitle">
        Buzzi Messenger
      </span>

      <div>

        <button onclick="toggleDark()">
          🌙
        </button>

        <button onclick="toggleSettings()">
          ⚙
        </button>

      </div>

    </div>

    <div
      id="typing"
      style="
      padding-left:10px;
      font-size:12px;
      opacity:.7;
      "
    ></div>

    <div
      id="messages"
      class="messages"
    ></div>

    <!-- EMOJI PICKER -->

    <div id="emojiPicker"></div>

    <!-- INPUT -->

    <div class="input">

      <button onclick="toggleEmojiPicker()">
        😊
      </button>

      <input
        id="msg"
        placeholder="Typ bericht..."
      >

      <button onclick="send()">
        Versturen
      </button>

    </div>

  </div>

</div>

<!-- SETTINGS -->

<div id="settings">

  <h3>⚙ Instellingen</h3>

  <hr>

  <h4>Status</h4>

  <button onclick="setStatus('online')">
    🟢 Online
  </button>

  <button onclick="setStatus('offline')">
    🔴 Offline
  </button>

  <button onclick="setStatus('afwezig')">
    🌙 Afwezig
  </button>

  <hr>

  <h4>Thema</h4>

  <button onclick="toggleDark()">
    🌙 Donkere modus
  </button>

  <button onclick="toggleLight()">
    ☀ Lichte modus
  </button>

  <hr>

  <h4>Meldingen</h4>

  <button onclick="enableNotifications()">
    🔔 Meldingen aanzetten
  </button>

  <hr>

  <h4>Avatar kiezen</h4>

  <div class="avatar-grid">

    <img
      class="avatar"
      src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=1"
      onclick="pickAvatar(this)"
    >

    <img
      class="avatar"
      src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=2"
      onclick="pickAvatar(this)"
    >

    <img
      class="avatar"
      src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=3"
      onclick="pickAvatar(this)"
    >

  </div>

  <hr>

  <button onclick="logout()">
    🚪 Uitloggen
  </button>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

// ====================================
// SOCKET
// ====================================

const socket =
  io("https://buzzimessenger.onrender.com");

// ====================================
// STATE
// ====================================

let me = null;
let active = null;

let chatCache = {};

// ====================================
// ELEMENTEN
// ====================================

const splash =
  document.getElementById("splash");

const auth =
  document.getElementById("auth");

const app =
  document.getElementById("app");

const usersBox =
  document.getElementById("users");

const messages =
  document.getElementById("messages");

// ====================================
// SPLASH
// ====================================

setTimeout(()=>{

  splash.style.display="none";

  auth.style.display="flex";

},1500);

// ====================================
// LOGIN
// ====================================

function login(){

  socket.emit("auth",{

    user:user.value,
    pass:pass.value,
    mode:mode.value

  });

}

socket.on("error_msg",(m)=>{

  error.innerText=m;

});

socket.on("login_ok",(u)=>{

  me = u.username;

  auth.style.display="none";

  app.style.display="flex";

  if(Notification.permission!=="granted"){

    Notification.requestPermission();

  }

});

// ====================================
// USERS
// ====================================

socket.on("users",(users)=>{

  usersBox.innerHTML="";

  users.forEach(u=>{

    if(!u) return;
    if(!u.username) return;

    if(u.username===me) return;

    const d=document.createElement("div");

    d.className="user";

    d.innerHTML=`

      <img
      class="avatar"
      src="${u.avatar}">

      <div>

        ${u.username}

        ${
          u.status==="online"
          ?'<span class="online-dot"></span>'
          :''
        }

        <br>

        <small>
          ${u.status}
        </small>

      </div>

    `;

    d.onclick=()=>{

      openChat(u.username);

    };

    usersBox.appendChild(d);

  });

});

// ====================================
// OPEN CHAT
// ====================================

function openChat(user){

  active=user;

  chatTitle.innerText =
    "Chat met " + user;

  messages.innerHTML="";

  if(chatCache[user]){

    chatCache[user].forEach(
      renderMessage
    );

  }

  socket.emit("history",{

    a:me,
    b:user

  });

}

// ====================================
// HISTORY
// ====================================

socket.on("history",(msgs)=>{

  if(!active) return;

  chatCache[active]=msgs;

  messages.innerHTML="";

  msgs.forEach(renderMessage);

});

// ====================================
// SEND
// ====================================

function send(){

  if(!active) return;

  if(!msg.value.trim()) return;

  socket.emit("msg",{

    from:me,
    to:active,
    text:msg.value,
    time:Date.now()

  });

  msg.value="";

}

// ====================================
// RENDER MESSAGE
// ====================================

function renderMessage(m){

  const d=document.createElement("div");

  d.className=
    "msg " +
    (m.from===me?"me":"other");

  d.innerHTML=`

    ${m.text}

    <div class="meta">

      ${new Date(
        m.time
      ).toLocaleTimeString()}

      ${m.read ? "✓✓" : "✓"}

    </div>

  `;

  messages.appendChild(d);

  messages.scrollTop =
    messages.scrollHeight;

}

// ====================================
// LIVE MESSAGE
// ====================================

socket.on("msg",(m)=>{

  const partner =
    (m.from===me)
    ?m.to
    :m.from;

  if(!chatCache[partner]){

    chatCache[partner]=[];

  }

  chatCache[partner].push(m);

  if(partner===active){

    renderMessage(m);

  }

  navigator.vibrate?.(100);

  if(Notification.permission==="granted"){

    new Notification(

      "Nieuw bericht van "+m.from,

      {
        body:m.text
      }

    );

  }

});

// ====================================
// TYPING
// ====================================

msg.addEventListener("input",()=>{

  if(!active) return;

  socket.emit("typing",{

    to:active,
    from:me

  });

});

socket.on("typing",(u)=>{

  typing.innerText =
    u + " typt...";

  clearTimeout(window.typingTimeout);

  window.typingTimeout=setTimeout(()=>{

    typing.innerText="";

  },1000);

});

// ====================================
// SETTINGS
// ====================================

function toggleSettings(){

  settings.style.display =
    settings.style.display==="block"
    ?"none"
    :"block";

}

// ====================================
// SETTINGS CLOSE
// ====================================

document.addEventListener(
  "click",
  (e)=>{

    if(
      settings.style.display==="block" &&
      !settings.contains(e.target) &&
      e.target.innerText!=="⚙"
    ){

      settings.style.display="none";

    }

  }
);

// ====================================
// STATUS
// ====================================

function setStatus(s){

  socket.emit("status_update",{

    user:me,
    status:s

  });

}

// ====================================
// AVATAR
// ====================================

function pickAvatar(el){

  socket.emit("avatar_update",{

    user:me,
    avatar:el.src

  });

}

// ====================================
// DARK MODE
// ====================================

function toggleDark(){

  document.body.classList.add("dark");

  localStorage.setItem(
    "theme",
    "dark"
  );

}

function toggleLight(){

  document.body.classList.remove("dark");

  localStorage.setItem(
    "theme",
    "light"
  );

}

if(
  localStorage.getItem("theme")
  ==="dark"
){

  document.body.classList.add("dark");

}

// ====================================
// NOTIFICATIONS
// ====================================

function enableNotifications(){

  if(
    Notification.permission
    !=="granted"
  ){

    Notification.requestPermission();

  }

}

// ====================================
// LOGOUT
// ====================================

function logout(){

  location.reload();

}

// ====================================
// EMOJI PICKER
// ====================================

const emojiList = [

  "😀","😁","😂","🤣","😊",
  "😍","😎","🔥","👍","❤️",
  "🎉","😜","🤩","🥳","😅",
  "😇","💪","👏","💯","🚀"

];

const emojiPicker =
  document.getElementById(
    "emojiPicker"
  );

emojiList.forEach(e=>{

  const span =
    document.createElement("span");

  span.className="emoji";

  span.innerText=e;

  span.onclick=()=>{

    msg.value += e;

    msg.focus();

  };

  emojiPicker.appendChild(span);

});

function toggleEmojiPicker(){

  emojiPicker.style.display =
    emojiPicker.style.display==="block"
    ?"none"
    :"block";

}

</script>

</body>
</html>
