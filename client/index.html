<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Buzzi Messenger</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma;
      background: linear-gradient(#cfe3ff, #ffffff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      display: flex;
      width: 720px;
      height: 560px;
      border: 1px solid #2b579a;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      background: white;
    }

    .contacts {
      width: 200px;
      background: #eaf3ff;
      border-right: 1px solid #2b579a;
      padding: 10px;
    }

    .contact {
      padding: 8px;
      margin-bottom: 6px;
      background: white;
      border: 1px solid #ccc;
      cursor: pointer;
    }

    .contact:hover {
      background: #d7ebff;
    }

    .chatbox {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #2b579a;
      color: white;
      padding: 10px;
      font-weight: bold;
    }

    .chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #f9fbff;
    }

    .msg {
      margin: 6px 0;
      padding: 6px 10px;
      border-radius: 8px;
      max-width: 75%;
      font-size: 14px;
    }

    .me {
      background: #d7ebff;
      margin-left: auto;
    }

    .other {
      background: #eeeeee;
      margin-right: auto;
    }

    .input {
      display: flex;
      border-top: 1px solid #ccc;
    }

    .input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    .input button {
      background: #2b579a;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="app">

  <!-- CONTACT LIST -->
  <div class="contacts">
    <h4>Contacten</h4>

    <div class="contact" onclick="selectUser('Friend 1')">🟢 Friend 1</div>
    <div class="contact" onclick="selectUser('Friend 2')">🟢 Friend 2</div>
    <div class="contact" onclick="selectUser('Friend 3')">🟡 Friend 3</div>
  </div>

  <!-- CHAT -->
  <div class="chatbox">

    <div class="header" id="header">💬 Geen chat geselecteerd</div>

    <div id="chat" class="chat"></div>

    <div class="input">
      <input id="text" placeholder="Typ bericht..." />
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://buzzimessenger.onrender.com");

let currentUser = null;
let chats = {}; // opslag per contact

function selectUser(name) {
  currentUser = name;
  document.getElementById("header").innerText = "💬 Chat met " + name;

  if (!chats[name]) chats[name] = [];

  renderChat();
}

function renderChat() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  if (!currentUser) return;

  chats[currentUser].forEach(m => {
    chat.innerHTML += `
      <div class="msg ${m.type}">
        ${m.text}
      </div>
    `;
  });

  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const input = document.getElementById("text");
  const msg = input.value.trim();
  if (!msg || !currentUser) return;

  if (!chats[currentUser]) chats[currentUser] = [];

  chats[currentUser].push({ text: "Jij: " + msg, type: "me" });
  renderChat();

  socket.emit("private_message", {
    to: currentUser,
    from: "Robbin",
    text: msg
  });

  input.value = "";
}

/* RECEIVE PRIVATE MESSAGE */
socket.on("private_message", (data) => {

  if (!chats[data.from]) chats[data.from] = [];

  chats[data.from].push({
    text: data.from + ": " + data.text,
    type: "other"
  });

  if (currentUser === data.from) {
    renderChat();
  }
});
</script>

</body>
</html>
