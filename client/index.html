<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buzzi Messenger</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:#eaf2ff;
}

#statusBar {
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  color:white;
  font-size:12px;
  padding:6px;
}

#login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input {
  margin:5px;
  padding:10px;
  width:220px;
}

#app {
  display:none;
}

.header {
  background:#2b579a;
  color:white;
  padding:10px;
}

.container {
  display:flex;
  height:calc(100vh - 40px);
}

.users {
  width:220px;
  background:#1e3f73;
  color:white;
  padding:10px;
}

.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages {
  flex:1;
  padding:10px;
  overflow:auto;
}

.msg {
  background:white;
  margin:5px;
  padding:8px;
  border-radius:10px;
}

.me {
  background:#cfe3ff;
  margin-left:auto;
}

.input {
  display:flex;
  padding:10px;
}

button {
  padding:10px;
  margin:5px;
  background:#2b579a;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div id="statusBar">⚪ Connecting...</div>

<!-- LOGIN -->
<div id="login">
  <h2>Buzzi Messenger</h2>

  <input id="username" placeholder="username">
  <input id="password" type="password" placeholder="password">

  <button id="btnRegister">Register</button>
  <button id="btnLogin">Login</button>

  <p id="statusText"></p>
</div>

<!-- APP -->
<div id="app">

  <div class="header">💙 Buzzi Messenger Stable</div>

  <div class="container">

    <div class="users" id="users"></div>

    <div class="chat">

      <div class="messages" id="messages"></div>

      <div class="input">
        <input id="msg" placeholder="message">
        <button id="btnSend">Send</button>
      </div>

    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

/* SOCKET */
const socket = io("https://buzzimessenger.onrender.com", {
  reconnection: true,
  reconnectionAttempts: 999,
  reconnectionDelay: 1000
});

/* STATE */
let me = "";

/* UI */
const statusBar = document.getElementById("statusBar");
const statusText = document.getElementById("statusText");

/* CONNECT */
socket.on("connect", () => {
  statusBar.innerText = "🟢 Connected";
});

socket.on("disconnect", () => {
  statusBar.innerText = "🟠 Disconnected";
});

/* LOGIN */
document.getElementById("btnLogin").addEventListener("click", () => {
  socket.emit("login", {
    username: username.value,
    password: password.value
  });

  statusText.innerText = "Logging in...";
});

/* REGISTER */
document.getElementById("btnRegister").addEventListener("click", () => {
  socket.emit("register", {
    username: username.value,
    password: password.value
  });

  statusText.innerText = "Registering...";
});

/* SEND */
document.getElementById("btnSend").addEventListener("click", () => {
  socket.emit("send_message", {
    from: me,
    text: msg.value
  });

  msg.value = "";
});

/* EVENTS */
socket.on("login_success", (data) => {
  me = data.username;

  login.style.display = "none";
  app.style.display = "block";

  statusText.innerText = "";
});

socket.on("login_failed", (msg) => {
  statusText.innerText = "❌ " + msg;
});

socket.on("register_ok", () => {
  statusText.innerText = "✅ Registered";
});

socket.on("register_failed", (msg) => {
  statusText.innerText = "❌ " + msg;
});

socket.on("users_update", (list) => {
  users.innerHTML = list.map(u => "👤 " + u).join("<br>");
});

socket.on("receive_message", (m) => {
  const div = document.createElement("div");
  div.className = "msg " + (m.from === me ? "me" : "");
  div.innerHTML = `<b>${m.from}</b><br>${m.text}`;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
});

</script>

</body>
</html>
