<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Buzzi MSN Clone</title>

<style>
body {
  margin: 0;
  font-family: Tahoma;
  background: #cfe3ff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.app {
  display: flex;
  width: 750px;
  height: 560px;
  background: white;
  border: 1px solid #2b579a;
}

.left {
  width: 220px;
  background: #eaf3ff;
  border-right: 1px solid #2b579a;
  padding: 10px;
}

.contact {
  padding: 6px;
  background: white;
  margin-bottom: 6px;
  border: 1px solid #ccc;
  cursor: pointer;
}

.right {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  background: #2b579a;
  color: white;
  padding: 10px;
}

.chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  background: #f9fbff;
}

.msg {
  margin: 5px 0;
  padding: 6px;
  border-radius: 4px;
}

.me {
  background: #d7ebff;
  margin-left: auto;
}

.other {
  background: #eee;
  margin-right: auto;
}

.input {
  display: flex;
  border-top: 1px solid #ccc;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
}

button {
  padding: 10px;
  background: #2b579a;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="app">

  <div class="left">
    <h4>Contacts</h4>
  </div>

  <div class="right">

    <div class="header" id="header">Select chat</div>
    <div id="chat" class="chat"></div>

    <div class="input">
      <input id="text" placeholder="Typ..." />
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://buzzimessenger.onrender.com");

let me = prompt("Username:");
let currentChat = null;
let chats = {};

// login
socket.emit("register", me);

// USERS LIST
socket.on("users", (list) => {
  const box = document.querySelector(".left");
  box.innerHTML = "<h4>Contacts</h4>";

  list.forEach(u => {
    if (u === me) return;

    const div = document.createElement("div");
    div.className = "contact";
    div.innerText = u;

    div.onclick = () => {
      currentChat = u;
      document.getElementById("header").innerText = "Chat met " + u;

      if (!chats[u]) chats[u] = [];
      render();
    };

    box.appendChild(div);
  });
});

// RENDER CHAT
function render() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  if (!currentChat) return;

  chats[currentChat].forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + m.type;
    div.innerText = m.text;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

// SEND MESSAGE
function send() {
  const input = document.getElementById("text");
  const msg = input.value.trim();

  if (!msg || !currentChat) return;

  chats[currentChat].push({
    text: "Jij: " + msg,
    type: "me"
  });

  render();

  socket.emit("private_message", {
    from: me,
    to: currentChat,
    text: msg
  });

  input.value = "";
}

// RECEIVE MESSAGE
socket.on("private_message", (data) => {
  if (!chats[data.from]) chats[data.from] = [];

  chats[data.from].push({
    text: data.from + ": " + data.text,
    type: "other"
  });

  if (currentChat === data.from) {
    render();
  }
});
</script>

</body>
</html>
