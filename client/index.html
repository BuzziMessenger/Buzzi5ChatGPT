<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buzzi Messenger 11.0</title>

<style>
body {
  margin:0;
  font-family: Segoe UI;
  background: linear-gradient(#dceaff, #f5f9ff);
}

/* LOGIN */
#login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input {
  margin:5px;
  padding:10px;
}

/* APP */
#app {
  display:none;
  height:100vh;
}

.header {
  background:#2b579a;
  color:white;
  padding:10px;
}

.container {
  display:flex;
  height:calc(100vh - 40px);
}

/* USERS */
.users {
  width:220px;
  background:#1e3f73;
  color:white;
  padding:10px;
}

/* CHAT */
.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages {
  flex:1;
  padding:10px;
  overflow:auto;
}

.msg {
  padding:8px;
  margin:6px;
  border-radius:10px;
  max-width:60%;
}

.me { background:#cfe3ff; margin-left:auto; }
.them { background:white; }

.input {
  display:flex;
  padding:10px;
}

button {
  padding:10px;
  background:#2b579a;
  color:white;
  border:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Buzzi Messenger</h2>
  <input id="user" placeholder="username">
  <input id="pass" type="password" placeholder="password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

  <div class="header">💙 Buzzi Messenger 11.0 FINAL</div>

  <div class="container">

    <div class="users" id="users"></div>

    <div class="chat">
      <div class="messages" id="messages"></div>

      <div class="input">
        <input id="msg" placeholder="Type message..." oninput="typing(true)" onblur="typing(false)">
        <button onclick="send()">Send</button>
      </div>
    </div>

  </div>
</div>

<!-- SOUNDS -->
<audio id="snd_msg" src="https://cdn.pixabay.com/audio/message.mp3"></audio>
<audio id="snd_login" src="https://cdn.pixabay.com/audio/notification.mp3"></audio>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io("https://buzzimessenger.onrender.com");

let me = "";
let currentChat = "global";

/* REGISTER */
function register() {
  socket.emit("register", {
    username: user.value,
    password: pass.value
  });
}

/* LOGIN */
function login() {
  socket.emit("login", {
    username: user.value,
    password: pass.value
  });
}

/* LOGIN SUCCESS */
socket.on("login_success", (data) => {
  me = data.username;

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
});

/* SOUNDS */
socket.on("sound", (type) => {
  if (type === "message") snd_msg.play();
  if (type === "login") snd_login.play();
});

/* SEND */
function send() {
  socket.emit("send_message", {
    from: me,
    to: currentChat,
    text: msg.value
  });

  msg.value = "";
}

/* RECEIVE */
socket.on("receive_message", (m) => {
  const box = document.getElementById("messages");

  const div = document.createElement("div");
  div.className = "msg " + (m.from === me ? "me" : "them");

  div.innerHTML = `<b>${m.from}</b><br>${m.text}`;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
});

/* USERS */
socket.on("users_update", (list) => {
  users.innerHTML = list.map(u => `<div>👤 ${u}</div>`).join("");
});

/* TYPING */
function typing(state) {
  socket.emit("typing", {
    user: me,
    to: currentChat,
    isTyping: state
  });
}
</script>

</body>
</html>
