<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buzzi Messenger</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body>

<div id="sidebar"></div>

<div id="chat">
  <div id="header">
    <span id="title">Buzzi</span>
    <div>
      <button onclick="buzz()">📳</button>
      <button onclick="wink('😂')">😂</button>
    </div>
  </div>

  <div id="messages"></div>

  <div id="input">
    <input id="msg">
    <button onclick="send()">Send</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
