<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buzzi Messenger UI Pro v1</title>

<style>

* {
  box-sizing: border-box;
}

body {
  margin:0;
  font-family:Segoe UI, Tahoma;
  background:#d7e7ff;
  height:100vh;
}

/* =========================
   AUTH
========================= */
#auth {
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#1f3f73,#2b579a);
  display:flex;
  justify-content:center;
  align-items:center;
}

.card {
  width:340px;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.card h3 {
  margin-top:0;
}

input {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

button {
  width:100%;
  padding:12px;
  background:#2b579a;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.error {
  color:red;
  font-size:12px;
  min-height:16px;
}

.switch {
  text-align:center;
  margin-top:10px;
  font-size:12px;
  cursor:pointer;
  color:#2b579a;
}

/* =========================
   APP LAYOUT
========================= */
.app {
  display:none;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#f5f8ff;
  border-right:1px solid #d0d8e8;
  display:flex;
  flex-direction:column;
}

.sidebar-header {
  padding:12px;
  background:#2b579a;
  color:white;
  font-weight:bold;
}

.user {
  padding:12px;
  margin:6px;
  background:white;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.user:hover {
  background:#e8f0ff;
}

/* CHAT */
.chat {
  flex:1;
  display:flex;
  flex-direction:column;
  background:#eaf2ff;
}

/* CHAT HEADER */
.chat-header {
  padding:12px;
  background:#2b579a;
  color:white;
  font-weight:bold;
}

/* MESSAGES */
.box {
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg {
  max-width:60%;
  padding:10px;
  border-radius:10px;
  background:white;
  align-self:flex-start;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.me {
  background:#cfe6ff;
  align-self:flex-end;
}

/* INPUT */
.input-bar {
  display:flex;
  padding:10px;
  background:white;
  border-top:1px solid #ccc;
}

.input-bar input {
  flex:1;
  margin:0;
  border-radius:20px;
}

.input-bar button {
  width:90px;
  margin-left:10px;
  border-radius:20px;
}

/* MOBILE FIX */
@media (max-width: 768px) {

  .sidebar {
    width:100px;
  }

  .user {
    font-size:12px;
    padding:8px;
  }

  .msg {
    max-width:80%;
  }
}

</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <div class="card">

    <h3 id="title">Login</h3>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="auth()">Login</button>

    <div class="error" id="error"></div>

    <div class="switch" onclick="toggleMode()">
      Nog geen account? Register hier
    </div>

  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="sidebar">
    <div class="sidebar-header">Contacten</div>
    <div id="users"></div>
  </div>

  <div class="chat">

    <div class="chat-header" id="chatTitle">
      Select chat
    </div>

    <div class="box" id="box"></div>

    <div class="input-bar">
      <input id="msg" placeholder="Type een bericht...">
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://buzzimessenger.onrender.com", {
  transports: ["websocket", "polling"]
});

let me = null;
let active = null;
let mode = "login";

/* =========================
   TOGGLE LOGIN / REGISTER
========================= */
function toggleMode() {

  const title = document.getElementById("title");
  const btn = document.querySelector("button");
  const sw = document.querySelector(".switch");
  const err = document.getElementById("error");

  err.innerText = "";

  if (mode === "login") {
    mode = "register";
    title.innerText = "Register";
    btn.innerText = "Create account";
    sw.innerText = "Al account? Login hier";
  } else {
    mode = "login";
    title.innerText = "Login";
    btn.innerText = "Login";
    sw.innerText = "Nog geen account? Register hier";
  }
}

/* =========================
   AUTH
========================= */
function auth(){

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if(!user || !pass){
    document.getElementById("error").innerText = "Vul alles in";
    return;
  }

  socket.emit("register", {
    user,
    pass,
    mode
  });
}

/* =========================
   LOGIN SUCCESS
========================= */
socket.on("login_success", (u) => {

  me = u.username;

  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "flex";
});

/* FAIL */
socket.on("login_fail", (msg) => {
  document.getElementById("error").innerText = msg;
});

/* =========================
   USERS
========================= */
socket.on("users", (users) => {

  const box = document.getElementById("users");
  box.innerHTML = "";

  users.forEach(u => {

    if(u.username === me) return;

    const d = document.createElement("div");
    d.className = "user";
    d.innerText = u.username;

    d.onclick = () => {
      active = u.username;
      socket.emit("get_history", { userA: me, userB: u.username });
      document.getElementById("chatTitle").innerText = "Chat met " + u.username;
    };

    box.appendChild(d);
  });

});

/* =========================
   HISTORY
========================= */
socket.on("history", render);

/* =========================
   CHAT UPDATE
========================= */
socket.on("chat_message", () => {
  if(active){
    socket.emit("get_history", { userA: me, userB: active });
  }
});

/* =========================
   SEND
========================= */
function send(){

  const i = document.getElementById("msg");
  if(!i.value || !active) return;

  socket.emit("chat_message", {
    from: me,
    to: active,
    text: i.value
  });

  i.value = "";
}

/* =========================
   RENDER CHAT
========================= */
function render(msgs){

  const box = document.getElementById("box");
  box.innerHTML = "";

  msgs.forEach(m => {

    const d = document.createElement("div");
    d.className = "msg " + (m.from === me ? "me" : "");
    d.innerText = m.from + ": " + m.text;

    box.appendChild(d);
  });

  box.scrollTop = box.scrollHeight;
}

</script>

</body>
</html>
