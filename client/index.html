<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Buzzi Messenger</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma, Arial;
      background: linear-gradient(#cfe3ff, #ffffff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .msn {
      width: 450px;
      height: 550px;
      background: #f4f9ff;
      border: 1px solid #2b579a;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .header {
      background: #2b579a;
      color: white;
      padding: 10px;
      font-weight: bold;
    }

    .status {
      font-size: 12px;
      color: #b6ffb6;
    }

    .chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: white;
    }

    .msg {
      margin: 6px 0;
      padding: 6px 10px;
      border-radius: 8px;
      max-width: 75%;
      font-size: 14px;
    }

    .me {
      background: #d7ebff;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #eeeeee;
      margin-right: auto;
    }

    .input {
      display: flex;
      border-top: 1px solid #ccc;
    }

    .input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    .input button {
      background: #2b579a;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="msn">
  <div class="header">
    💬 Buzzi Messenger
    <div class="status">🟢 Online</div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="input">
    <input id="text" placeholder="Typ bericht..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
async function send() {
  const input = document.getElementById("text");
  const msg = input.value.trim();
  if (!msg) return;

  const chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg me">Jij: ${msg}</div>`;
  input.value = "";

  chat.scrollTop = chat.scrollHeight;

  const res = await fetch("https://buzzimessenger.onrender.com/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  chat.innerHTML += `<div class="msg bot">Bot: ${data.reply}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
