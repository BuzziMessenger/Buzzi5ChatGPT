<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Buzzi Messenger</title>

<style>

body{margin:0;font-family:Segoe UI;background:#d7e7ff;height:100vh;overflow:hidden}

#splash{
  position:fixed;inset:0;
  background:#2b579a;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
}

#auth{
  position:fixed;inset:0;
  background:#1f3f73;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  width:300px;
}

.app{display:none;height:100vh;display:flex}

.sidebar{width:250px;background:#f5f8ff}

.header{background:#2b579a;color:white;padding:10px}

.user{padding:10px;margin:5px;background:white;cursor:pointer}

.chat{flex:1;display:flex;flex-direction:column}

.box{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:10px}

.msg{
  padding:10px;
  border-radius:15px;
  max-width:60%;
}

.me{background:#cfe6ff;align-self:flex-end}
.other{background:white}

.input{display:flex;padding:10px;background:white}

.input input{flex:1;padding:10px}

</style>
</head>

<body>

<div id="splash">
  <h1>Buzzi Messenger</h1>
  <p>Laden...</p>
</div>

<div id="auth">
  <div class="card">
    <input id="user" placeholder="user">
    <input id="pass" type="password" placeholder="pass">

    <select id="mode">
      <option value="login">login</option>
      <option value="register">register</option>
    </select>

    <button onclick="auth()">OK</button>
  </div>
</div>

<div class="app" id="app">

  <div class="sidebar">
    <div class="header">Contacten</div>
    <div id="users"></div>
  </div>

  <div class="chat">

    <div class="header" id="chatTitle">Chat</div>

    <div class="box" id="box"></div>

    <div class="input">
      <input id="msg">
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://buzzimessenger.onrender.com");

let me=null;
let active=null;

setTimeout(()=>{
  splash.style.display="none";
  auth.style.display="flex";
},1500);

function auth(){
  socket.emit("register",{
    user:user.value,
    pass:pass.value,
    mode:mode.value
  });
}

socket.on("login_success",(u)=>{
  me=u.username;
  auth.style.display="none";
  app.style.display="flex";
});

socket.on("login_error",(e)=>{
  alert("Login fout: "+e);
});

socket.on("users",users=>{
  usersBox.innerHTML="";

  users.forEach(u=>{
    if(u.username===me) return;

    const d=document.createElement("div");
    d.className="user";
    d.innerText=u.username;

    d.onclick=()=>{
      active=u.username;
      socket.emit("get_history",{userA:me,userB:active});
    };

    usersBox.appendChild(d);
  });
});

socket.on("history",render);

function send(){
  socket.emit("chat_message",{
    from:me,
    to:active,
    text:msg.value,
    time:Date.now()
  });

  msg.value="";
}

function render(msgs){
  box.innerHTML="";

  msgs.forEach(m=>{
    const d=document.createElement("div");
    d.className="msg "+(m.from===me?"me":"other");
    d.innerText=m.text;
    box.appendChild(d);
  });
}

</script>

</body>
</html>
