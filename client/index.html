<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Buzzi Messenger Pro</title>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  background:#e7f0ff;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#2b579a;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* LOGIN */
#auth{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:#1f3f73;
}

.card{
  background:white;
  padding:20px;
  border-radius:14px;
  width:300px;
}

/* APP */
#app{
  display:none;
  height:100vh;
  flex-direction:row;
}

/* USERS */
.sidebar{
  width:250px;
  background:#f4f7ff;
  overflow:auto;
}

.user{
  padding:10px;
  margin:5px;
  background:white;
  cursor:pointer;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header{
  background:#2b579a;
  color:white;
  padding:10px;
}

.box{
  flex:1;
  padding:10px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  padding:10px;
  border-radius:12px;
  max-width:60%;
}

.me{background:#cfe6ff;align-self:flex-end}
.other{background:white}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:white;
}

.input input{
  flex:1;
  padding:10px;
}

/* EMOJI */
#emoji{
  display:none;
  position:absolute;
  bottom:70px;
  right:20px;
  background:white;
  padding:10px;
  border-radius:10px;
}

/* MOBILE FIX */
@media(max-width:768px){
  #app{flex-direction:column}
  .sidebar{width:100%;display:flex}
  .user{min-width:120px}
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1>Buzzi Messenger</h1>
  <p>is aan het laden...</p>
</div>

<!-- LOGIN -->
<div id="auth">
  <div class="card">
    <h3>Inloggen / Registreren</h3>
    <input id="user" placeholder="Gebruikersnaam"><br><br>
    <input id="pass" type="password" placeholder="Wachtwoord"><br><br>

    <select id="mode">
      <option value="login">Inloggen</option>
      <option value="register">Registreren</option>
    </select><br><br>

    <button onclick="auth()">Start</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="sidebar">
    <div class="header">Contacten</div>
    <div id="users"></div>
  </div>

  <div class="chat">

    <div class="header">
      Chat
      <button onclick="toggleEmoji()">😊</button>
      <button onclick="toggleSettings()">⚙</button>
    </div>

    <div id="box" class="box"></div>

    <div class="input">
      <input id="msg">
      <button onclick="send()">Versturen</button>
    </div>

  </div>

</div>

<!-- EMOJI -->
<div id="emoji">
  😀 😄 😎 ❤️ 🔥 👍 😂
</div>

<audio id="sound" src="data:audio/mp3;base64,//uQx..." />

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://buzzimessenger.onrender.com");

let me=null;
let active=null;

setTimeout(()=>{
  splash.style.display="none";
  auth.style.display="flex";
},1500);

function auth(){
  socket.emit("auth",{
    user:user.value,
    pass:pass.value,
    mode:mode.value
  });
}

socket.on("login_ok",(u)=>{
  me=u.username;
  auth.style.display="none";
  app.style.display="flex";
});

socket.on("error_msg",(m)=>{
  alert(m);
});

socket.on("users",(users)=>{
  const box=document.getElementById("users");
  box.innerHTML="";

  users.forEach(u=>{
    if(u.username===me) return;

    const d=document.createElement("div");
    d.className="user";
    d.innerText=u.username + " ("+u.status+")";

    d.onclick=()=>{
      active=u.username;
      socket.emit("history",{a:me,b:active});
    };

    box.appendChild(d);
  });
});

socket.on("history",(msgs)=>{
  const box=document.getElementById("box");
  box.innerHTML="";

  msgs.forEach(m=>{
    const d=document.createElement("div");
    d.className="msg "+(m.from===me?"me":"other");
    d.innerText=m.text;
    box.appendChild(d);
  });
});

socket.on("msg",(m)=>{
  const sound=document.getElementById("sound");
  sound.play().catch(()=>{});

  const box=document.getElementById("box");
  const d=document.createElement("div");
  d.className="msg "+(m.from===me?"me":"other");
  d.innerText=m.text;
  box.appendChild(d);
});

function send(){
  socket.emit("msg",{
    from:me,
    to:active,
    text:msg.value,
    time:Date.now()
  });

  msg.value="";
}

function toggleEmoji(){
  const e=document.getElementById("emoji");
  e.style.display = e.style.display==="block"?"none":"block";
}

function toggleSettings(){
  alert("Instellingen komen in v2");
}

</script>

</body>
</html>
