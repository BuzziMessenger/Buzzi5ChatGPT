<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<title>Buzzi Desktop Messenger</title>

<style>
body {
  margin: 0;
  font-family: Tahoma, Arial;
  background: linear-gradient(#3a6ea5, #1e3a5f);
  height: 100vh;
  overflow: hidden;
}

/* 🖥 DESKTOP */
.desktop {
  position: relative;
  width: 100%;
  height: 100vh;
}

/* 🪟 WINDOW */
.window {
  width: 320px;
  background: #eceff5;
  border: 2px solid #2b579a;
  position: absolute;
  top: 80px;
  left: 80px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* HEADER BAR */
.titlebar {
  background: linear-gradient(#3a6ea5, #2b579a);
  color: white;
  padding: 6px;
  font-size: 13px;
  cursor: move;
}

/* CHAT */
#messages {
  height: 250px;
  overflow-y: auto;
  background: white;
  padding: 8px;
  font-size: 13px;
}

/* INPUT */
.input {
  display: flex;
  padding: 5px;
  background: #dfe7f2;
}

input {
  flex: 1;
  padding: 5px;
}

button {
  margin-left: 5px;
}

/* TASKBAR */
.taskbar {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40px;
  background: #1b1b1b;
  display: flex;
  align-items: center;
  padding: 5px;
  color: white;
}

.start {
  background: #2b579a;
  padding: 5px 10px;
  cursor: pointer;
}

/* USERS WINDOW */
.users {
  position: absolute;
  top: 80px;
  left: 450px;
  width: 200px;
  background: #eceff5;
  border: 2px solid #2b579a;
}

.user {
  padding: 5px;
  border-bottom: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="desktop">

  <!-- CHAT WINDOW -->
  <div class="window" id="chatWindow">
    <div class="titlebar">💬 Buzzi Messenger</div>

    <div id="messages"></div>

    <div class="input">
      <input id="msgInput" />
      <button onclick="send()">Send</button>
      <button onclick="nudge()">📳</button>
    </div>
  </div>

  <!-- USERS WINDOW -->
  <div class="users" id="usersWindow">
    <div class="titlebar">🟢 Online</div>
    <div id="users"></div>
  </div>

  <!-- TASKBAR -->
  <div class="taskbar">
    <div class="start">Start</div>
    <div style="margin-left:10px;">Buzzi Messenger Running</div>
  </div>

</div>

<!-- SOCKET -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io("https://buzzimessenger.onrender.com");

const msg = document.getElementById("messages");
const users = document.getElementById("users");
const input = document.getElementById("msgInput");

let myName = prompt("Username:");
socket.emit("add_user", { name: myName });

socket.on("receive_message", (m) => {
  const div = document.createElement("div");
  div.innerHTML = `<b>${m.from}:</b> ${m.text}`;
  msg.appendChild(div);
});

socket.on("update_users", (list) => {
  users.innerHTML = "";
  list.forEach(u => {
    const d = document.createElement("div");
    d.className = "user";
    d.innerText = u.name;
    users.appendChild(d);
  });
});

function send() {
  socket.emit("send_message", {
    from: myName,
    text: input.value
  });
  input.value = "";
}

function nudge() {
  socket.emit("nudge", myName);
}
</script>

</body>
</html>
