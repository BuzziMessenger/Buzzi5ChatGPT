<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Buzzi Messenger</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

body{
  margin:0;
  font-family:Segoe UI,sans-serif;
  height:100vh;
  display:flex;
  background:#eaf1ff;
}

#contacts{
  width:260px;
  background:#dfe8ff;
  overflow:auto;
  padding:10px;
  box-sizing:border-box;
}

.contact{
  background:white;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
}

.contact:hover{
  background:#f4f4f4;
}

#chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

#header{
  background:#2b579a;
  color:white;
  padding:12px;
}

#msgs{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  padding:8px;
  margin:5px;
  border-radius:8px;
  max-width:60%;
}

.me{
  background:#c7f7c7;
  margin-left:auto;
}

.other{
  background:white;
}

#input{
  display:flex;
  gap:5px;
  padding:10px;
}

#msg{
  flex:1;
  padding:10px;
}

.buzz{
  animation:shake .1s infinite;
}

@keyframes shake{
  0%{transform:translate(2px)}
  50%{transform:translate(-2px)}
  100%{transform:translate(-2px)}
}

#wink{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:120px;
  pointer-events:none;
}

</style>

</head>

<body>

<div id="contacts"></div>

<div id="chat">

  <div id="header">
    Buzzi Messenger
  </div>

  <div id="msgs"></div>

  <div id="input">
    <input id="msg" placeholder="Typ een bericht...">
    <button onclick="send()">Verstuur</button>
    <button onclick="buzz()">Buzz</button>
    <button onclick="sendWink()">😂</button>
  </div>

</div>

<script>

const socket =
io("https://buzzimessenger.onrender.com");

let me = "";
let active = null;

const username =
prompt("Gebruikersnaam");

socket.emit("login", username);

socket.on("login_ok", data => {
  me = data.username;
});

socket.on("users", users => {

  contacts.innerHTML = "";

  users.forEach(user => {

    if(user.username === me) return;

    const div =
    document.createElement("div");

    div.className = "contact";

    div.innerText =
    user.username;

    div.onclick = () => {
      active = user.username;
    };

    contacts.appendChild(div);

  });

});

socket.on("msg", addMsg);

function addMsg(m){

  const div =
  document.createElement("div");

  div.className =
  "msg " +
  (m.from === me ? "me" : "other");

  div.innerText =
  m.from + ": " + m.text;

  msgs.appendChild(div);

  msgs.scrollTop =
  msgs.scrollHeight;

}

function send(){

  if(!msg.value.trim()) return;

  socket.emit("msg",{
    from:me,
    to:active,
    text:msg.value,
    time:Date.now()
  });

  msg.value = "";

}

function buzz(){

  socket.emit("buzz",{
    from:me,
    to:active
  });

}

socket.on("buzz", () => {

  document.body.classList.add("buzz");

  setTimeout(() => {
    document.body.classList.remove("buzz");
  }, 500);

});

function sendWink(){

  socket.emit("wink",{
    from:me,
    to:active,
    emoji:"😂"
  });

}

socket.on("wink", data => {

  const div =
  document.createElement("div");

  div.id = "wink";

  div.innerText =
  data.emoji;

  document.body.appendChild(div);

  setTimeout(() => {
    div.remove();
  }, 1000);

});

</script>

</body>
</html>
