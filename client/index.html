<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buzzi Messenger</title>

<style>

/* =======================
   BASE
======================= */

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: Segoe UI;
  background: #e7f0ff;
}

/* =======================
   SPLASH
======================= */

#splash {
  position: fixed;
  inset: 0;
  background: #2b579a;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* =======================
   LOGIN
======================= */

#auth {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: #1f3f73;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
}

/* =======================
   APP STRUCTUUR (STABIEL)
======================= */

#app {
  display: none;
  height: 100dvh;
  display: flex;
  overflow: hidden;
}

/* CONTACTEN */
.sidebar {
  width: 260px;
  background: #f4f7ff;
  overflow-y: auto;
  flex-shrink: 0;
}

.user {
  padding: 10px;
  margin: 5px;
  background: white;
  cursor: pointer;
}

/* CHAT */
.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

/* HEADER */
.header {
  background: #2b579a;
  color: white;
  padding: 10px;
  display: flex;
  justify-content: space-between;
}

/* MESSAGES */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 0;
}

.msg {
  padding: 10px;
  border-radius: 12px;
  max-width: 65%;
  word-break: break-word;
}

.me {
  background: #cfe6ff;
  align-self: flex-end;
}

.other {
  background: white;
}

/* INPUT */
.input {
  display: flex;
  padding: 10px;
  background: white;
  flex-shrink: 0;
}

.input input {
  flex: 1;
  font-size: 16px;
  padding: 10px;
}

/* =======================
   SETTINGS
======================= */

#settings {
  display: none;
  position: fixed;
  right: 10px;
  top: 60px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  width: 220px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  z-index: 999;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin: 5px;
  cursor: pointer;
  border: 2px solid transparent;
}

.avatar.selected {
  border: 2px solid #2b579a;
}

/* =======================
   MOBILE (STABIEL)
======================= */

@media (max-width: 768px) {

  #app {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    height: 80px;
    display: flex;
    overflow-x: auto;
  }

  .user {
    min-width: 120px;
    text-align: center;
    flex-shrink: 0;
  }

  .messages {
    padding-bottom: 5px;
  }
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1>Buzzi Messenger</h1>
  <p>is aan het laden...</p>
</div>

<!-- LOGIN -->
<div id="auth">
  <div class="card">
    <h3>Inloggen / Registreren</h3>

    <input id="user" placeholder="Gebruikersnaam"><br><br>
    <input id="pass" type="password" placeholder="Wachtwoord"><br><br>

    <select id="mode">
      <option value="login">Inloggen</option>
      <option value="register">Registreren</option>
    </select><br><br>

    <button onclick="login()">Start</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="sidebar">
    <div id="users"></div>
  </div>

  <div class="chat">

    <div class="header">
      <div id="activeChat">Chat</div>
      <button onclick="toggleSettings()">⚙</button>
    </div>

    <div id="messages" class="messages"></div>

    <div class="input">
      <input id="msg" placeholder="Typ bericht...">
      <button onclick="send()">Versturen</button>
    </div>

  </div>

</div>

<!-- SETTINGS -->
<div id="settings">

  <h4>Status</h4>
  <button onclick="setStatus('online')">🟢 Online</button>
  <button onclick="setStatus('offline')">🔴 Offline</button>

  <h4>Profielfoto</h4>

  <div>
    <img class="avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=chat1" onclick="setAvatar(this)">
    <img class="avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=chat2" onclick="setAvatar(this)">
    <img class="avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=chat3" onclick="setAvatar(this)">
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://buzzimessenger.onrender.com");

const authBox = document.getElementById("auth");
const appBox = document.getElementById("app");
const splashBox = document.getElementById("splash");

const usersBox = document.getElementById("users");
const messagesBox = document.getElementById("messages");
const activeChatLabel = document.getElementById("activeChat");

let me = null;
let active = null;
let chatCache = {}; // 🧠 STABIELE CHAT STATE

/* SPLASH */
setTimeout(() => {
  splashBox.style.display = "none";
  authBox.style.display = "flex";
}, 1500);

/* LOGIN */
function login(){
  socket.emit("auth",{
    user:user.value,
    pass:pass.value,
    mode:mode.value
  });
}

socket.on("login_ok",(u)=>{
  me = u.username;
  authBox.style.display = "none";
  appBox.style.display = "flex";
});

/* USERS */
socket.on("users",(users)=>{

  usersBox.innerHTML="";

  users.forEach(u=>{
    if(u.username === me) return;

    const d=document.createElement("div");
    d.className="user";

    d.innerHTML = `${u.username}<br><small>${u.status}</small>`;

    d.onclick=()=>{
      setActiveChat(u.username);
    };

    usersBox.appendChild(d);
  });

});

/* =========================
   CHAT STATE FIX (BELANGRIJK)
========================= */

function setActiveChat(user){

  active = user;
  activeChatLabel.innerText = "Chat met " + user;

  messagesBox.innerHTML = "";

  if(chatCache[user]){
    chatCache[user].forEach(renderMessage);
  }

  socket.emit("history",{a:me,b:active});
}

/* HISTORY */
socket.on("history",(msgs)=>{

  if(!active) return;

  chatCache[active] = msgs;

  messagesBox.innerHTML = "";

  msgs.forEach(renderMessage);

});

/* LIVE MESSAGE */
socket.on("msg",(m)=>{

  const partner = (m.from === me) ? m.to : m.from;

  if(!chatCache[partner]) chatCache[partner] = [];

  chatCache[partner].push(m);

  if(partner === active){
    renderMessage(m);
  }

});

/* RENDER */
function renderMessage(m){

  const d=document.createElement("div");
  d.className="msg "+(m.from===me?"me":"other");
  d.innerText=m.text;

  messagesBox.appendChild(d);
  messagesBox.scrollTop = messagesBox.scrollHeight;
}

/* SEND */
function send(){

  if(!active) return;

  socket.emit("msg",{
    from:me,
    to:active,
    text:msg.value,
    time:Date.now()
  });

  msg.value="";
}

/* SETTINGS */
function toggleSettings(){
  const s=document.getElementById("settings");
  s.style.display = s.style.display==="block"?"none":"block";
}

function setStatus(s){
  socket.emit("status_update",{user:me,status:s});
}

function setAvatar(el){
  document.querySelectorAll(".avatar").forEach(a=>a.classList.remove("selected"));
  el.classList.add("selected");
}

</script>

</body>
</html>
