<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<title>Buzzi MSN Clone</title>

<style>
body {
  margin: 0;
  font-family: Tahoma;
  background: linear-gradient(#cfe3ff, #ffffff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.app {
  display: flex;
  width: 750px;
  height: 560px;
  border: 1px solid #2b579a;
  background: white;
}

.sidebar {
  width: 220px;
  background: #eaf3ff;
  border-right: 1px solid #2b579a;
  padding: 10px;
}

.user {
  font-weight: bold;
  margin-bottom: 10px;
}

.contact {
  padding: 6px;
  margin: 5px 0;
  background: white;
  border: 1px solid #ccc;
  cursor: pointer;
}

.contact:hover {
  background: #d7ebff;
}

.chatbox {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  background: #2b579a;
  color: white;
  padding: 10px;
}

.chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  background: #f9fbff;
}

.msg {
  margin: 5px 0;
  padding: 6px 10px;
  border-radius: 6px;
  max-width: 70%;
}

.me { background: #d7ebff; margin-left: auto; }
.other { background: #eee; margin-right: auto; }

.input {
  display: flex;
  border-top: 1px solid #ccc;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
}

button {
  padding: 10px;
  background: #2b579a;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <div class="user" id="me">👤 ...</div>
    <div id="users"></div>
  </div>

  <div class="chatbox">
    <div class="header" id="chatWith">💬 Geen chat</div>
    <div id="chat" class="chat"></div>

    <div class="input">
      <input id="text" placeholder="Typ..." />
      <button onclick="send()">Send</button>
    </div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://buzzimessenger.onrender.com");

let me = prompt("Kies je username:");
document.getElementById("me").innerText = "👤 " + me;

socket.emit("register", me);

let currentChat = null;
let chats = {};

// USERS LIST
socket.on("users", (list) => {
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  list.forEach(u => {
    if (u === me) return;

    const div = document.createElement("div");
    div.className = "contact";
    div.innerText = "🟢 " + u;

    div.onclick = () => openChat(u);

    usersDiv.appendChild(div);
  });
});

function openChat(user) {
  currentChat = user;
  document.getElementById("chatWith").innerText = "💬 Chat met " + user;

  if (!chats[user]) chats[user] = [];

  render();
}

function render() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  if (!currentChat) return;

  chats[currentChat].forEach(m => {
    chat.innerHTML += `<div class="msg ${m.type}">${m.text}</div>`;
  });

  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const input = document.getElementById("text");
  const msg = input.value.trim();
  if (!msg || !currentChat) return;

  if (!chats[currentChat]) chats[currentChat] = [];

  chats[currentChat].push({ text: "Jij: " + msg, type: "me" });
  render();

  socket.emit("private_message", {
    from: me,
    to: currentChat,
    text: msg
  });

  input.value = "";
}

// RECEIVE MESSAGE
socket.on("private_message", (data) => {

  if (!chats[data.from]) chats[data.from] = [];

  chats[data.from].push({
    text: data.from + ": " + data.text,
    type: "other"
  });

  if (currentChat === data.from) {
    render();
  }
});
</script>

</body>
</html>
