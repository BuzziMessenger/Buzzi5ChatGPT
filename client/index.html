<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buzzi Messenger v5</title>

<style>

body {
  margin: 0;
  font-family: Tahoma;
  background: #d7e7ff;
  height: 100vh;
  overflow: hidden;
}

/* AUTH WRAPPER */
#auth {
  position: fixed;
  inset: 0;
  background: linear-gradient(#1f3f73,#2b579a);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* BOX */
.card {
  width: 320px;
  background: white;
  border-radius: 10px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* INPUTS */
input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border: 1px solid #ccc;
  border-radius: 6px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 10px;
  background: #2b579a;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* SWITCH */
.switch {
  text-align: center;
  margin-top: 10px;
  font-size: 12px;
  cursor: pointer;
  color: #2b579a;
}

/* ERROR */
.error {
  color: red;
  font-size: 12px;
  margin-top: 5px;
  min-height: 16px;
}

/* APP */
.app {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 260px;
  background: #f2f7ff;
  border-right: 1px solid #2b579a;
}

.header {
  background: #2b579a;
  color: white;
  padding: 10px;
}

.user {
  padding: 10px;
  margin: 5px;
  background: white;
  cursor: pointer;
}

.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.box {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  padding: 6px;
  margin: 4px;
  background: white;
  border-radius: 5px;
}

.me { background: #cfe6ff; margin-left: auto; }

.input {
  display: flex;
}

input.msgInput {
  flex: 1;
  padding: 10px;
}

button.send {
  width: 100px;
}

</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <div class="card">

    <h3 id="title">Login</h3>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="auth()">Login</button>

    <div class="error" id="error"></div>

    <div class="switch" onclick="toggleMode()">
      Nog geen account? Register hier
    </div>

  </div>
</div>

<!-- APP -->
<div class="app" style="display:none;" id="app">

  <div class="sidebar">
    <div class="header">Contacten</div>
    <div id="users"></div>
  </div>

  <div class="chat">
    <div class="header" id="chatTitle">Select chat</div>
    <div class="box" id="box"></div>

    <div class="input">
      <input class="msgInput" id="msg">
      <button class="send" onclick="send()">Send</button>
    </div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://buzzimessenger.onrender.com");
  transports: ["websocket", "polling"]
});

let me=null;
let active=null;
let mode="login"; // login | register

/* SWITCH LOGIN / REGISTER */
function toggleMode(){
  const t=document.getElementById("title");
  const btn=document.querySelector("#auth button");
  const sw=document.querySelector(".switch");

  if(mode==="login"){
    mode="register";
    t.innerText="Register";
    btn.innerText="Create account";
    sw.innerText="Al account? Login hier";
  } else {
    mode="login";
    t.innerText="Login";
    btn.innerText="Login";
    sw.innerText="Nog geen account? Register hier";
  }

  document.getElementById("error").innerText="";
}

/* AUTH ACTION */
function auth(){
  const user=document.getElementById("user").value;
  const pass=document.getElementById("pass").value;

  if(!user || !pass){
    document.getElementById("error").innerText="Vul alles in";
    return;
  }

  socket.emit("register", { user, pass });
}

/* LOGIN SUCCESS */
socket.on("login_success",(u)=>{
  me=u.name;

  document.getElementById("auth").style.display="none";
  document.getElementById("app").style.display="flex";
});

/* LOGIN FAIL */
socket.on("login_fail",()=>{
  document.getElementById("error").innerText="Login mislukt (check wachtwoord)";
});

/* USERS */
socket.on("users",(users)=>{

  const box=document.getElementById("users");
  box.innerHTML="";

  users.forEach(u=>{
    if(u.name===me) return;

    const d=document.createElement("div");
    d.className="user";
    d.innerText=u.name;

    d.onclick=()=>{
      active=u.name;
      socket.emit("get_history",{userA:me,userB:u.name});
      document.getElementById("chatTitle").innerText="Chat met "+u.name;
    };

    box.appendChild(d);
  });

});

/* HISTORY */
socket.on("history",(msgs)=>{
  render(msgs);
});

/* CHAT */
socket.on("chat_message",(msg)=>{
  if(active){
    socket.emit("get_history",{userA:me,userB:active});
  }
});

/* SEND */
function send(){
  const i=document.getElementById("msg");

  if(!i.value || !active) return;

  socket.emit("chat_message",{
    from:me,
    to:active,
    text:i.value
  });

  i.value="";
}

/* RENDER */
function render(msgs){
  const box=document.getElementById("box");
  box.innerHTML="";

  msgs.forEach(m=>{
    const d=document.createElement("div");
    d.className="msg "+(m.from===me?"me":"");
    d.innerText=m.from+": "+m.text;
    box.appendChild(d);
  });
}

</script>

</body>
</html>
