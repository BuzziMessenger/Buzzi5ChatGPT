<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buzzi Messenger 6.0</title>

<style>
body { margin:0; font-family:Arial; background:#e6f0ff; }

#login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#app {
  display:none;
  height:100vh;
}

#chat {
  display:flex;
  flex-direction:column;
  height:100%;
}

#messages {
  flex:1;
  overflow:auto;
  background:white;
  padding:10px;
}

.msg {
  margin:5px 0;
}

#input {
  display:flex;
}

input {
  flex:1;
  padding:10px;
}
button {
  padding:10px;
}
</style>
</head>

<body>

<div id="login">
  <h2>Buzzi Messenger Login</h2>
  <input id="user" placeholder="username">
  <input id="pass" type="password" placeholder="password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="app">

  <div id="chat">
    <div id="messages"></div>

    <div id="input">
      <input id="msg">

      <input type="file" id="file">

      <button onclick="send()">Send</button>
    </div>

    <button onclick="startVoice()">🎤 Voice</button>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io("https://buzzimessenger.onrender.com");

let username = "";

/* REGISTER */
async function register() {
  await fetch("https://buzzimessenger.onrender.com/register", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      username: user.value,
      password: pass.value
    })
  });

  alert("Registered!");
}

/* LOGIN */
async function login() {
  const res = await fetch("https://buzzimessenger.onrender.com/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      username: user.value,
      password: pass.value
    })
  });

  const data = await res.json();

  username = data.username;

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  socket.emit("auth", { username });
}

/* SEND MESSAGE */
async function send() {
  let fileUrl = "";

  const file = document.getElementById("file").files[0];

  if (file) {
    const form = new FormData();
    form.append("file", file);

    const res = await fetch("https://buzzimessenger.onrender.com/upload", {
      method:"POST",
      body: form
    });

    const data = await res.json();
    fileUrl = data.url;
  }

  socket.emit("send_message", {
    from: username,
    text: msg.value,
    file: fileUrl
  });

  msg.value = "";
}

/* RECEIVE */
socket.on("receive_message", (m) => {
  messages.innerHTML += `
    <div class="msg">
      <b>${m.from}:</b> ${m.text || ""}
      ${m.file ? `<br><a href="${m.file}" target="_blank">📎 file</a>` : ""}
    </div>
  `;
});

/* 🎤 VOICE */
let recorder;
let chunks = [];

async function startVoice() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio:true });

  recorder = new MediaRecorder(stream);
  recorder.start();

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.onstop = async () => {
    const blob = new Blob(chunks, { type:"audio/webm" });

    const form = new FormData();
    form.append("file", blob, "voice.webm");

    const res = await fetch("https://buzzimessenger.onrender.com/upload", {
      method:"POST",
      body: form
    });

    const data = await res.json();

    socket.emit("send_message", {
      from: username,
      voice: data.url
    });

    chunks = [];
  };

  setTimeout(() => recorder.stop(), 4000);
}
</script>

</body>
</html>
