<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>MSN v4 FIXED</title>

<style>
body {
  margin: 0;
  font-family: Tahoma;
  background: #cfe3ff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.app {
  width: 850px;
  height: 650px;
  display: flex;
  background: white;
  border: 1px solid #2b579a;
}

/* LEFT */
.left {
  width: 260px;
  background: #eaf3ff;
  border-right: 1px solid #2b579a;
  padding: 10px;
}

.user {
  padding: 6px;
  margin: 5px 0;
  background: white;
  border: 1px solid #ccc;
  cursor: pointer;
}

.status {
  font-size: 11px;
  color: gray;
}

.badge {
  float: right;
  background: red;
  color: white;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
}

.dot {
  height: 8px;
  width: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 5px;
}

.online { background: green; }
.offline { background: gray; }

/* RIGHT */
.right {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  background: #2b579a;
  color: white;
  padding: 10px;
}

.chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  background: #f9fbff;
}

.msg {
  margin: 5px 0;
  padding: 6px;
  max-width: 75%;
}

.me {
  background: #d7ebff;
  margin-left: auto;
}

.other {
  background: #eee;
}

.typing {
  font-size: 12px;
  color: gray;
  padding: 5px;
}

.input {
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-top: 1px solid #ccc;
}

button {
  padding: 10px;
  background: #2b579a;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="app">

  <div class="left">
    <h4>Contacts</h4>
    <div id="users"></div>
  </div>

  <div class="right">

    <div class="header" id="header">Select chat</div>
    <div class="chat" id="chat"></div>
    <div class="typing" id="typing"></div>

    <div class="input">
      <input id="input" placeholder="Typ..." />
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://buzzimessenger.onrender.com");

let me = null;
let active = null;
let chats = {};
let unread = {};

// FIX: login pas na connect
socket.on("connect", () => {
  console.log("connected");

  me = prompt("Username:");
  socket.emit("register", me);
});

// USERS (FIXED)
socket.on("users", (users) => {
  const box = document.getElementById("users");
  box.innerHTML = "";

  if (!users) return;

  Object.entries(users).forEach(([name, data]) => {
    if (!name || name === me) return;

    const div = document.createElement("div");
    div.className = "user";

    const status = data?.status || "offline";

    const badge = unread[name]
      ? `<div class="badge">${unread[name]}</div>`
      : "";

    div.innerHTML = `
      <div>
        <span class="dot ${status === "online" ? "online" : "offline"}"></span>
        ${name}
      </div>
      <div class="status">${status}</div>
      ${badge}
    `;

    div.onclick = () => {
      active = name;
      unread[name] = 0;

      document.getElementById("header").innerText = "Chat met " + name;

      if (!chats[name]) chats[name] = [];

      render();
    };

    box.appendChild(div);
  });
});

// CHAT
socket.on("chat_message", (msg) => {
  const other = msg.from === me ? msg.to : msg.from;

  if (!chats[other]) chats[other] = [];

  chats[other].push({
    text: `${msg.from}: ${msg.text}`,
    type: msg.from === me ? "me" : "other"
  });

  if (active !== other) {
    unread[other] = (unread[other] || 0) + 1;
  }

  if (active === other) render();
});

// TYPING
socket.on("typing", (data) => {
  if (data.from === active) {
    document.getElementById("typing").innerText =
      data.from + " is aan het typen...";

    setTimeout(() => {
      document.getElementById("typing").innerText = "";
    }, 1000);
  }
});

// SEND
function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();

  if (!text || !active) return;

  socket.emit("chat_message", {
    from: me,
    to: active,
    text
  });

  input.value = "";
}

// typing emit
document.getElementById("input").addEventListener("input", () => {
  if (!active) return;

  socket.emit("typing", {
    from: me,
    to: active
  });
});

// render
function render() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  (chats[active] || []).forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + m.type;
    div.innerText = m.text;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
