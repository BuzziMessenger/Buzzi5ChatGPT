<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>MSN FINAL</title>

<style>
body {
  margin: 0;
  font-family: Tahoma;
  background: #cfe3ff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.app {
  width: 900px;
  height: 650px;
  display: flex;
  background: white;
  border: 1px solid #2b579a;
}

/* LEFT */
.left {
  width: 270px;
  background: #eaf3ff;
  border-right: 1px solid #2b579a;
  padding: 10px;
  overflow-y: auto;
}

.user {
  padding: 8px;
  margin: 6px 0;
  background: white;
  border: 1px solid #ccc;
  cursor: pointer;
}

.status {
  font-size: 11px;
  color: gray;
}

.online { color: green; }
.offline { color: gray; }

/* RIGHT */
.right {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  background: #2b579a;
  color: white;
  padding: 10px;
}

.chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  background: #f9fbff;
}

.msg {
  margin: 5px 0;
  padding: 6px;
  max-width: 70%;
}

.me {
  background: #d7ebff;
  margin-left: auto;
}

.other {
  background: #eee;
}

.typing {
  font-size: 12px;
  color: gray;
  padding: 5px;
}

/* INPUT */
.input {
  display: flex;
  border-top: 1px solid #ccc;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
}

button {
  padding: 10px;
  background: #2b579a;
  color: white;
  border: none;
}

/* STATUS BAR */
.statusbar {
  display: flex;
  gap: 5px;
  padding: 5px;
  border-bottom: 1px solid #ccc;
}

.statusbar input {
  border: 1px solid #ccc;
  padding: 5px;
}
</style>
</head>

<body>

<div class="app">

  <div class="left">
    <h4>Contacts</h4>
    <div id="users"></div>
  </div>

  <div class="right">

    <div class="header" id="header">Select chat</div>

    <div class="statusbar">
      <input id="statusText" placeholder="Set status (e.g. Away for lunch)" />
      <button onclick="setStatus()">Set</button>
    </div>

    <div class="chat" id="chat"></div>
    <div class="typing" id="typing"></div>

    <div class="input">
      <input id="input" placeholder="Typ..." />
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://buzzimessenger.onrender.com");

let me = null;
let active = null;
let chats = {};

socket.on("connect", () => {
  me = prompt("Username:");
  socket.emit("register", me);
});

/* USERS */
socket.on("users", (users) => {
  const box = document.getElementById("users");
  box.innerHTML = "";

  Object.entries(users).forEach(([name, data]) => {
    if (name === me) return;

    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
      <b>${name}</b><br>
      <span class="${data.status === "online" ? "online" : "offline"}">
        ${data.status}
      </span><br>
      <small>${data.text || ""}</small>
    `;

    div.onclick = () => {
      active = name;
      document.getElementById("header").innerText = "Chat met " + name;

      socket.emit("get_history", { userA: me, userB: name });
    };

    box.appendChild(div);
  });
});

/* HISTORY */
socket.on("history", (msgs) => {
  chats[active] = msgs;
  render();
});

/* CHAT */
socket.on("chat_message", (msg) => {
  const other = msg.from === me ? msg.to : msg.from;

  if (!chats[other]) chats[other] = [];
  chats[other].push(msg);

  if (active === other) render();

  playSound();
});

/* TYPING */
socket.on("typing", (d) => {
  if (d.from === active) {
    document.getElementById("typing").innerText =
      d.from + " is typing...";
    setTimeout(() => {
      document.getElementById("typing").innerText = "";
    }, 800);
  }
});

/* SEND */
function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();

  if (!text || !active) return;

  socket.emit("chat_message", {
    from: me,
    to: active,
    text
  });

  input.value = "";
}

/* STATUS TEXT */
function setStatus() {
  const text = document.getElementById("statusText").value;

  socket.emit("set_status_text", {
    user: me,
    text
  });
}

/* TYPING */
document.getElementById("input").addEventListener("input", () => {
  if (!active) return;

  socket.emit("typing", {
    from: me,
    to: active
  });
});

/* SOUND */
function playSound() {
  const audio = new Audio("https://actions.google.com/sounds/v1/notifications/digital_watch_alarm_long.ogg");
  audio.play();
}

/* RENDER */
function render() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  (chats[active] || []).forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + (m.from === me ? "me" : "other");
    div.innerText = `${m.from}: ${m.text}`;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
