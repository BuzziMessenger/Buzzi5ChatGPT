<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Buzzi Messenger</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #e9f1ff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 420px;
      height: 520px;
      background: white;
      border: 1px solid #2b579a;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #2b579a;
      color: white;
      padding: 10px;
      font-weight: bold;
    }

    .chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      margin: 6px 0;
    }

    .me { color: blue; }
    .bot { color: green; }

    .input {
      display: flex;
      border-top: 1px solid #ccc;
    }

    .input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    .input button {
      padding: 10px;
      background: #2b579a;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<div class="box">
  <div class="header">💬 Buzzi Messenger</div>

  <div id="chat" class="chat"></div>

  <div class="input">
    <input id="text" placeholder="Typ bericht..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
function add(text, type) {
  const chat = document.getElementById("chat");
  chat.innerHTML += `<div class="msg ${type}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("text");
  const msg = input.value.trim();
  if (!msg) return;

  add("Jij: " + msg, "me");
  input.value = "";

  try {
    const res = await fetch("https://buzzimessenger.onrender.com/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();
    add("Bot: " + data.reply, "bot");

  } catch (e) {
    add("❌ Server error", "bot");
  }
}
</script>

</body>
</html>
