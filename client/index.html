<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buzzi Messenger 11.2 Bulletproof</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:#eaf2ff;
}

/* STATUS BAR */
#statusBar {
  position:fixed;
  top:0;
  width:100%;
  background:#222;
  color:white;
  padding:6px;
  font-size:12px;
}

/* LOGIN */
#login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input { margin:5px; padding:10px; }

#app { display:none; }

.header {
  background:#2b579a;
  color:white;
  padding:10px;
}

.container {
  display:flex;
  height:calc(100vh - 40px);
}

.users {
  width:220px;
  background:#1e3f73;
  color:white;
  padding:10px;
}

.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages {
  flex:1;
  padding:10px;
  overflow:auto;
}

.msg {
  background:white;
  margin:5px;
  padding:8px;
  border-radius:10px;
}

.input {
  display:flex;
  padding:10px;
}

button {
  padding:10px;
  background:#2b579a;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div id="statusBar">⚪ Connecting...</div>

<!-- LOGIN -->
<div id="login">
  <h2>Buzzi Messenger</h2>

  <input id="user" placeholder="username">
  <input id="pass" type="password" placeholder="password">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>

  <p id="status"></p>
</div>

<!-- APP -->
<div id="app">

  <div class="header">💙 Buzzi 11.2 Bulletproof</div>

  <div class="container">

    <div class="users" id="users"></div>

    <div class="chat">

      <div class="messages" id="messages"></div>

      <div class="input">
        <input id="msg">
        <button onclick="send()">Send</button>
      </div>

    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

/* 🔥 MULTIPLE FALLBACK URLS */
const SOCKET_URLS = [
  "https://buzzimessenger.onrender.com",
  "http://localhost:3000"
];

const SOCKET_URLS = [
  "https://buzzimessenger.onrender.com",
  "http://localhost:3000"
];

let socket = io(SOCKET_URLS[0], {
  reconnection: true,
  reconnectionAttempts: 999,
  reconnectionDelay: 1000
});
let me = "";

/* CONNECT FUNCTION */
function connect(urlIndex = 0) {

  if (urlIndex >= SOCKET_URLS.length) {
    document.getElementById("statusBar").innerText = "🔴 Offline (no server)";
    return;
  }

  const url = SOCKET_URLS[urlIndex];

  document.getElementById("statusBar").innerText = "⚪ Connecting: " + url;

  socket = io(url, {
    reconnection: true,
    reconnectionAttempts: 10,
    reconnectionDelay: 1000
  });

  socket.on("connect", () => {
    document.getElementById("statusBar").innerText = "🟢 Connected";
  });

  socket.on("disconnect", () => {
    document.getElementById("statusBar").innerText = "🟠 Disconnected - retrying...";
  });

  socket.on("connect_error", () => {
    document.getElementById("statusBar").innerText = "🔴 Failed - trying fallback...";
    setTimeout(() => connect(urlIndex + 1), 2000);
  });

  bindSocketEvents();
}

connect();

/* EVENTS */
function bindSocketEvents() {

  socket.on("login_success", (data) => {
    me = data.username;
    login.style.display = "none";
    app.style.display = "block";
  });

  socket.on("login_failed", (msg) => {
    status.innerText = "❌ " + msg;
  });

  socket.on("register_ok", () => {
    status.innerText = "✅ Registered";
  });

  socket.on("register_failed", (msg) => {
    status.innerText = "❌ " + msg;
  });

  socket.on("users_update", (list) => {
    users.innerHTML = list.map(u => "👤 " + u).join("<br>");
  });

  socket.on("receive_message", (m) => {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = "<b>" + m.from + "</b><br>" + m.text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  });
}

/* LOGIN */
function login() {
  socket.emit("login", {
    username: user.value,
    password: pass.value
  });

  status.innerText = "Logging in...";
}

/* REGISTER */
function register() {
  socket.emit("register", {
    username: user.value,
    password: pass.value
  });

  status.innerText = "Registering...";
}

/* SEND */
function send() {
  socket.emit("send_message", {
    from: me,
    text: msg.value
  });

  msg.value = "";
}

</script>

</body>
</html>
