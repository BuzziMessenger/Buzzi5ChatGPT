<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buzzi Messenger V12.1 Final</title>

<style>

* { box-sizing:border-box; }

body {
  margin:0;
  font-family:Segoe UI;
  height:100vh;
  background:linear-gradient(135deg,#d7e7ff,#bcd6ff);
  overflow:hidden;
}

/* AUTH */
#auth {
  position:fixed;
  inset:0;
  background:#1f3f73;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card {
  width:340px;
  background:white;
  padding:20px;
  border-radius:12px;
}

/* APP */
.app {
  display:none;
  height:100vh;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:rgba(255,255,255,0.75);
  backdrop-filter: blur(10px);
  border-right:1px solid #cdd8ea;
}

.header {
  background:#2b579a;
  color:white;
  padding:10px;
  font-weight:bold;
}

.user {
  padding:10px;
  margin:6px;
  background:white;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

.dot {
  width:9px;
  height:9px;
  border-radius:50%;
  background:gray;
}

.online { background:limegreen; }

/* CHAT */
.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat-header {
  background:#2b579a;
  color:white;
  padding:10px;
}

/* BOX */
.box {
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:6px;
  background:#eaf2ff;
}

.msg {
  max-width:70%;
  padding:10px;
  border-radius:12px;
  background:white;
  word-break:break-word;
}

.me {
  align-self:flex-end;
  background:#cfe6ff;
}

/* INPUT */
.input-bar {
  display:flex;
  padding:10px;
  background:white;
  border-top:1px solid #cdd8ea;
}

.input-bar input {
  flex:1;
  padding:10px;
  border-radius:20px;
}

.input-bar button {
  width:90px;
  margin-left:10px;
  border-radius:20px;
}

/* typing */
#typing {
  font-size:12px;
  color:gray;
  padding:4px 10px;
  height:16px;
}

/* mobile fix */
@media(max-width:768px){
  .sidebar{width:90px;}
  .user span{display:none;}
  .msg{max-width:85%;}
}

</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <div class="card">
    <h3>Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="auth()">Login</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="sidebar">
    <div class="header">Contacten</div>
    <div id="users"></div>
  </div>

  <div class="chat">

    <div class="chat-header" id="chatTitle">Select chat</div>

    <div class="box" id="box"></div>

    <div id="typing"></div>

    <div class="input-bar">
      <input id="msg" oninput="typing()">
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://buzzimessenger.onrender.com");

let me = null;
let active = null;
let typingTimeout;

/* AUTH */
function auth(){
  socket.emit("register", {
    user: user.value,
    pass: pass.value,
    mode: "login"
  });
}

/* LOGIN */
socket.on("login_success", (u) => {
  me = u.username;
  auth.style.display = "none";
  app.style.display = "flex";
});

/* USERS SAFE */
socket.on("users", users => {

  usersBox.innerHTML = "";

  users.forEach(u => {

    if(!u || !u.username) return;
    if(u.username === me) return;

    const d = document.createElement("div");
    d.className = "user";

    d.innerHTML = `
      <span>${u.username}</span>
      <div class="dot ${u.status==="online"?"online":""}"></div>
    `;

    d.onclick = () => {
      active = u.username;
      socket.emit("get_history", { userA: me, userB: active });
      chatTitle.innerText = "Chat met " + active;
    };

    usersBox.appendChild(d);
  });

});

/* HISTORY */
socket.on("history", render);

/* CHAT UPDATE */
socket.on("chat_message", () => {
  if(active){
    socket.emit("get_history", { userA: me, userB: active });
  }
});

/* SEND */
function send(){

  if(!msg.value || !active) return;

  socket.emit("chat_message", {
    from: me,
    to: active,
    text: msg.value,
    time: Date.now()
  });

  msg.value = "";
}

/* TYPING */
function typing(){

  if(!active) return;

  socket.emit("typing", { from: me, to: active });

  clearTimeout(typingTimeout);

  typingTimeout = setTimeout(() => {
    socket.emit("stop_typing", { from: me, to: active });
  }, 700);
}

socket.on("typing", d => {
  if(d.from === active){
    typing.innerText = active + " is aan het typen...";
  }
});

socket.on("stop_typing", () => typing.innerText = "");

/* RENDER */
function render(msgs){

  box.innerHTML = "";

  msgs.forEach(m => {

    const time = m.time
      ? new Date(m.time).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})
      : "";

    const d = document.createElement("div");
    d.className = "msg " + (m.from === me ? "me" : "");

    d.innerText = `${m.from}: ${m.text}${time ? " ("+time+")" : ""}`;

    box.appendChild(d);
  });

  box.scrollTop = box.scrollHeight;
}

</script>

</body>
</html>
