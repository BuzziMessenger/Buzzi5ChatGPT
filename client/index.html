<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buzzi v8</title>

<style>

body {
  margin: 0;
  font-family: Tahoma;
  height: 100vh;
  overflow: hidden;
  background: #d7e7ff;
}

#login {
  position: fixed;
  inset: 0;
  background: #1f3f73;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  flex-direction: column;
}

.app {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 260px;
  background: #f2f7ff;
  border-right: 1px solid #2b579a;
  overflow-y: auto;
}

.header {
  background: #2b579a;
  color: white;
  padding: 10px;
}

.user {
  padding: 10px;
  margin: 5px;
  background: white;
  cursor: pointer;
  border-radius: 6px;
}

.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.box {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  background: #eef5ff;
}

.msg {
  padding: 6px;
  margin: 5px;
  background: white;
  border-radius: 6px;
}

.me { background: #cfe6ff; margin-left: auto; }

.input {
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  background: #2b579a;
  color: white;
  border: none;
  padding: 10px;
}

</style>
</head>

<body>

<div id="login">
  <h2>Buzzi v8</h2>
  <input id="user" placeholder="user">
  <input id="pass" type="password" placeholder="pass">
  <button onclick="login()">Login</button>
</div>

<div class="app">

  <div class="sidebar">
    <div class="header">Contacten</div>
    <div id="users"></div>
  </div>

  <div class="chat">
    <div class="header" id="title">Select chat</div>
    <div class="box" id="box"></div>

    <div class="input">
      <input id="msg">
      <button onclick="send()">Send</button>
    </div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://buzzimessenger.onrender.com");

let me=null;
let active=null;
let chats={};

/* login */
function login(){
  socket.emit("register",{
    user:document.getElementById("user").value,
    pass:document.getElementById("pass").value
  });
}

socket.on("login_success",(u)=>{
  me=u.name;
  document.getElementById("login").style.display="none";
});

/* users */
socket.on("users",(users)=>{
  const box=document.getElementById("users");
  box.innerHTML="";

  Object.keys(users).forEach(name=>{
    if(name===me)return;

    const d=document.createElement("div");
    d.className="user";
    d.innerText=name;
    d.onclick=()=>{
      active=name;
      socket.emit("get_history",{userA:me,userB:name});
      document.getElementById("title").innerText="Chat met "+name;
    };

    box.appendChild(d);
  });
});

/* history */
socket.on("history",(msgs)=>{
  if(!active)return;

  chats[active]=msgs;
  render();
});

/* chat */
socket.on("chat_message",(msg)=>{
  const other=msg.from===me?msg.to:msg.from;

  if(!chats[other])chats[other]=[];
  chats[other].push(msg);

  if(active===other)render();
});

/* send */
function send(){
  const i=document.getElementById("msg");

  if(!i.value||!active)return;

  socket.emit("chat_message",{
    from:me,
    to:active,
    text:i.value
  });

  i.value="";
}

/* render */
function render(){
  const box=document.getElementById("box");
  box.innerHTML="";

  (chats[active]||[]).forEach(m=>{
    const d=document.createElement("div");
    d.className="msg "+(m.from===me?"me":"");
    d.innerText=m.from+": "+m.text;
    box.appendChild(d);
  });
}

</script>

</body>
</html>
