<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Buzzi Messenger Pro</title>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  background:#e7f0ff;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#2b579a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* LOGIN */
#auth{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:#1f3f73;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  width:300px;
}

/* APP LAYOUT */
#app{
  display:none;
  height:100vh;
  flex-direction:row;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:#f4f7ff;
  overflow:auto;
}

.user{
  padding:10px;
  margin:5px;
  background:white;
  cursor:pointer;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header{
  background:#2b579a;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.box{
  flex:1;
  padding:10px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  padding:10px;
  border-radius:12px;
  max-width:60%;
}

.me{background:#cfe6ff;align-self:flex-end}
.other{background:white}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:white;
}

.input input{
  flex:1;
  padding:10px;
}

/* SETTINGS */
#settings{
  display:none;
  position:fixed;
  right:10px;
  top:60px;
  background:white;
  padding:15px;
  border-radius:10px;
  width:220px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  margin-right:5px;
  cursor:pointer;
  border:2px solid transparent;
}

.avatar.selected{
  border:2px solid #2b579a;
}

/* MOBILE FIX */
@media (max-width: 768px) {

  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
  }

  /* BELANGRIJK: moderne mobile hoogte */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh; /* FIX voor mobile browsers */
    max-height: 100dvh;
  }

  /* USERS BAR */
  .sidebar {
    width: 100%;
    height: 70px;
    display: flex;
    flex-direction: row;
    overflow-x: auto;
    flex-shrink: 0;
  }

  .user {
    min-width: 120px;
    flex-shrink: 0;
    font-size: 13px;
  }

  /* CHAT AREA */
  .chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0; /* CRUCIAAL */
  }

  /* MESSAGES */
  .box {
    flex: 1;
    overflow-y: auto;
    min-height: 0; /* CRUCIAAL */
    -webkit-overflow-scrolling: touch;
  }

  /* INPUT BLIJFT VAST */
  .input {
    flex-shrink: 0;
    position: relative;
    bottom: 0;
    background: white;
  }

  .input input {
    font-size: 16px; /* voorkomt iOS zoom bug */
  }

}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1>Buzzi Messenger</h1>
  <p>is aan het laden...</p>
</div>

<!-- LOGIN -->
<div id="auth">
  <div class="card">
    <h3>Inloggen / Registreren</h3>

    <input id="user" placeholder="Gebruiker"><br><br>
    <input id="pass" type="password" placeholder="Wachtwoord"><br><br>

    <select id="mode">
      <option value="login">Inloggen</option>
      <option value="register">Registreren</option>
    </select><br><br>

    <button onclick="login()">Start</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="sidebar">
    <div id="users"></div>
  </div>

  <div class="chat">

    <div class="header">
      <div>Chat</div>
      <button onclick="toggleSettings()">⚙</button>
    </div>

    <div id="box" class="box"></div>

    <div class="input">
      <input id="msg">
      <button onclick="send()">Versturen</button>
    </div>

  </div>

</div>

<!-- SETTINGS -->
<div id="settings">

  <h4>Status</h4>

  <button onclick="setStatus('online')">🟢 Online</button>
  <button onclick="setStatus('offline')">🔴 Offline</button>

  <h4>Profielfoto</h4>

  <div>
    <img class="avatar" src="https://i.pravatar.cc/100?img=1" onclick="setAvatar(this)">
    <img class="avatar" src="https://i.pravatar.cc/100?img=2" onclick="setAvatar(this)">
    <img class="avatar" src="https://i.pravatar.cc/100?img=3" onclick="setAvatar(this)">
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://buzzimessenger.onrender.com");

const authBox = document.getElementById("auth");
const appBox = document.getElementById("app");
const splashBox = document.getElementById("splash");
const usersBox = document.getElementById("users");

let me = null;
let active = null;
let status = "online";
let avatar = null;

/* SPLASH */
setTimeout(() => {
  splashBox.style.display = "none";
  authBox.style.display = "flex";
}, 1500);

/* LOGIN */
function login(){
  socket.emit("auth",{
    user:user.value,
    pass:pass.value,
    mode:mode.value
  });
}

socket.on("login_ok",(u)=>{
  me = u.username;
  authBox.style.display = "none";
  appBox.style.display = "flex";
});

/* USERS */
socket.on("users",(users)=>{

  usersBox.innerHTML="";

  users.forEach(u=>{
    if(u.username === me) return;

    const d=document.createElement("div");
    d.className="user";

    d.innerHTML = `
      ${u.username}<br>
      <small>${u.status || "offline"}</small>
    `;

    d.onclick=()=>{
      active=u.username;
      socket.emit("history",{a:me,b:active});
    };

    usersBox.appendChild(d);
  });

});

/* CHAT */
socket.on("history",(msgs)=>{
  const box=document.getElementById("box");
  box.innerHTML="";

  msgs.forEach(m=>{
    const d=document.createElement("div");
    d.className="msg "+(m.from===me?"me":"other");
    d.innerText=m.text;
    box.appendChild(d);
  });

});

/* SEND */
function send(){
  socket.emit("msg",{
    from:me,
    to:active,
    text:msg.value,
    time:Date.now()
  });

  msg.value="";
}

/* SETTINGS */
function toggleSettings(){
  const s=document.getElementById("settings");
  s.style.display = s.style.display==="block"?"none":"block";
}

function setStatus(s){
  status=s;
  alert("Status: "+s);
  socket.emit("status_update",{user:me,status:s});
}

function setAvatar(el){
  document.querySelectorAll(".avatar").forEach(a=>a.classList.remove("selected"));
  el.classList.add("selected");
  avatar = el.src;
  alert("Profielfoto gekozen");
}

</script>

</body>
</html>
