<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buzzi Messenger Snapshot</title>

<style>

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Segoe UI;
  height:100vh;
  background:#d7e7ff;
  overflow:hidden;
}

/* AUTH */
#auth{
  position:fixed;
  inset:0;
  background:#1f3f73;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:340px;
  background:white;
  padding:20px;
  border-radius:12px;
}

/* APP */
.app{
  display:none;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#f5f8ff;
  border-right:1px solid #cdd8ea;
}

.header{
  background:#2b579a;
  color:white;
  padding:10px;
}

/* USER */
.user{
  padding:10px;
  margin:6px;
  background:white;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
  border-radius:10px;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat-header{
  background:#2b579a;
  color:white;
  padding:10px;
}

.box{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.msg{
  max-width:70%;
  padding:10px;
  border-radius:12px;
  background:white;
  word-break:break-word;
}

.me{
  align-self:flex-end;
  background:#cfe6ff;
}

/* INPUT */
.input-bar{
  display:flex;
  padding:10px;
  background:white;
}

.input-bar input{
  flex:1;
  padding:10px;
  border-radius:20px;
}

.input-bar button{
  width:90px;
  margin-left:10px;
}

/* typing */
#typing{
  font-size:12px;
  color:gray;
  padding:5px 10px;
  height:16px;
}

</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <div class="card">

    <h3>Login / Register</h3>

    <input id="user" placeholder="username">
    <input id="pass" type="password" placeholder="password">

    <select id="mode">
      <option value="login">Login</option>
      <option value="register">Register</option>
    </select>

    <button onclick="auth()">Start</button>

  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="sidebar">
    <div class="header">Contacten 😄</div>
    <div id="users"></div>
  </div>

  <div class="chat">

    <div class="chat-header" id="chatTitle">Select chat</div>

    <div class="box" id="box"></div>

    <div id="typing"></div>

    <div class="input-bar">
      <input id="msg" oninput="typing()">
      <button onclick="send()">Send 🚀</button>
    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://buzzimessenger.onrender.com");

let me=null;
let active=null;
let typingTimeout;

/* SAFE DOM */
const authEl=document.getElementById("auth");
const appEl=document.getElementById("app");
const usersBox=document.getElementById("users");
const box=document.getElementById("box");
const msg=document.getElementById("msg");
const typingEl=document.getElementById("typing");
const chatTitle=document.getElementById("chatTitle");
const user=document.getElementById("user");
const pass=document.getElementById("pass");
const mode=document.getElementById("mode");

/* AUTH */
function auth(){
  socket.emit("register",{
    user:user.value,
    pass:pass.value,
    mode:mode.value
  });
}

/* LOGIN */
socket.on("login_success",(u)=>{
  me=u.username;
  authEl.style.display="none";
  appEl.style.display="flex";
});

/* USERS */
socket.on("users",users=>{

  usersBox.innerHTML="";

  users.forEach(u=>{

    if(!u?.username || u.username===me) return;

    const d=document.createElement("div");
    d.className="user";

    d.innerHTML=`💬 ${u.username}`;

    d.onclick=()=>{
      active=u.username;
      socket.emit("get_history",{userA:me,userB:active});
      chatTitle.innerText="Chat met "+active;
    };

    usersBox.appendChild(d);
  });

});

/* CHAT */
socket.on("chat_message",()=>{
  if(active){
    socket.emit("get_history",{userA:me,userB:active});
  }
});

socket.on("history",render);

/* SEND */
function send(){

  if(!msg.value||!active) return;

  socket.emit("chat_message",{
    from:me,
    to:active,
    text:msg.value,
    time:Date.now()
  });

  msg.value="";
}

/* TYPING */
function typing(){

  if(!active) return;

  socket.emit("typing",{from:me,to:active});

  clearTimeout(typingTimeout);

  typingTimeout=setTimeout(()=>{
    socket.emit("stop_typing",{from:me,to:active});
  },700);
}

socket.on("typing",d=>{
  if(d.from===active){
    typingEl.innerText=active+" is aan het typen... ✍️";
  }
});

socket.on("stop_typing",()=>typingEl.innerText="");

/* RENDER */
function render(msgs){

  box.innerHTML="";

  msgs.forEach(m=>{

    const d=document.createElement("div");
    d.className="msg "+(m.from===me?"me":"");

    d.innerText=`${m.text} 😄`;

    box.appendChild(d);
  });

  box.scrollTop=box.scrollHeight;
}

</script>

</body>
</html>
