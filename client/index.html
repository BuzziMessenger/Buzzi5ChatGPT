<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buzzi Messenger 4.0</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  height:100vh;
  background:#e6f0ff;
}

/* USERS */
#users {
  width:220px;
  background:#2b579a;
  color:white;
  padding:10px;
}

.user {
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px;
  cursor:pointer;
}

.user img {
  width:30px;
  height:30px;
  border-radius:50%;
}

/* CHAT AREA */
#desktop {
  flex:1;
  position:relative;
}

/* DM WINDOW */
.window {
  position:absolute;
  width:320px;
  height:400px;
  background:white;
  border:2px solid #2b579a;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.title {
  background:#2b579a;
  color:white;
  padding:6px;
  cursor:move;
}

.messages {
  height:300px;
  overflow:auto;
  padding:8px;
}

.input {
  display:flex;
}

input {
  flex:1;
  padding:8px;
}

button {
  padding:8px;
}

/* AVATARS */
.msg {
  display:flex;
  gap:8px;
  margin:6px 0;
}

.msg img {
  width:25px;
  height:25px;
  border-radius:50%;
}
</style>
</head>

<body>

<div id="users"></div>
<div id="desktop"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io("https://buzzimessenger.onrender.com");

let me = prompt("Username:");
let avatar = prompt("Avatar URL (https://...jpg/png)");

socket.emit("add_user", { name: me, avatar });

const usersBox = document.getElementById("users");
const desktop = document.getElementById("desktop");

let openChats = {};

/* USERS */
socket.on("update_users", (list) => {
  usersBox.innerHTML = "<h3>Online</h3>";

  list.forEach(u => {
    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
      <img src="${u.avatar}">
      <span>${u.name}</span>
    `;

    div.onclick = () => openDM(u.name, u.avatar);

    usersBox.appendChild(div);
  });
});

/* OPEN DM WINDOW */
function openDM(user, avatarUrl) {
  if (openChats[user]) return;

  const win = document.createElement("div");
  win.className = "window";
  win.id = "dm_" + user;
  win.style.top = "100px";
  win.style.left = "250px";

  win.innerHTML = `
    <div class="title">Chat with ${user}</div>

    <div class="messages" id="msg_${user}"></div>

    <div class="input">
      <input id="input_${user}">
      <button onclick="sendDM('${user}','${avatarUrl}')">Send</button>
    </div>
  `;

  desktop.appendChild(win);

  openChats[user] = true;

  socket.emit("load_dm", {
    user1: me,
    user2: user
  });
}

/* LOAD HISTORY */
socket.on("dm_history", (msgs) => {
  msgs.forEach(m => renderMsg(m));
});

/* RECEIVE DM */
socket.on("private_message", (m) => {
  renderMsg(m);
});

/* RENDER MESSAGE */
function renderMsg(m) {
  const box = document.getElementById("msg_" + (m.from === me ? m.to : m.from));
  if (!box) return;

  const div = document.createElement("div");
  div.className = "msg";

  div.innerHTML = `
    <img src="${m.avatar}">
    <div>
      <b>${m.from}:</b> ${m.text}
      <small>${m.seen ? "✔✔ seen" : "✔ sent"}</small>
    </div>
  `;

  box.appendChild(div);
}

/* SEND DM */
function sendDM(to, avatarUrl) {
  const input = document.getElementById("input_" + to);

  socket.emit("private_message", {
    from: me,
    to,
    text: input.value,
    avatar: avatar
  });

  input.value = "";
}
</script>

</body>
</html>
