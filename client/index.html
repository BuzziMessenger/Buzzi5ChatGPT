<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buzzi Messenger Clean</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:#eaf2ff;
}

#statusBar {
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  color:white;
  padding:6px;
  font-size:12px;
}

#login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input {
  margin:5px;
  padding:10px;
  width:220px;
}

#app {
  display:none;
  height:100vh;
}

.header {
  background:#2b579a;
  color:white;
  padding:10px;
}

.container {
  display:flex;
  height:calc(100vh - 40px);
}

.users {
  width:220px;
  background:#1e3f73;
  color:white;
  padding:10px;
}

.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages {
  flex:1;
  padding:10px;
  overflow:auto;
}

.msg {
  background:white;
  margin:5px;
  padding:8px;
  border-radius:10px;
  max-width:60%;
}

.me {
  background:#cfe3ff;
  margin-left:auto;
}

.input {
  display:flex;
  padding:10px;
  background:white;
}

button {
  padding:10px;
  margin:5px;
  background:#2b579a;
  color:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="statusBar">⚪ Connecting...</div>

<!-- LOGIN -->
<div id="login">
  <h2>Buzzi Messenger</h2>

  <input id="username" placeholder="username">
  <input id="password" type="password" placeholder="password">

  <button id="btnRegister">Register</button>
  <button id="btnLogin">Login</button>

  <p id="statusText"></p>
</div>

<!-- APP -->
<div id="app">

  <div class="header">💙 Buzzi Messenger Clean</div>

  <div class="container">

    <div class="users" id="users"></div>

    <div class="chat">

      <div class="messages" id="messages"></div>

      <div class="input">
        <input id="messageInput" placeholder="Type message...">
        <button id="btnSend">Send</button>
      </div>

    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
/* =========================
   APP STATE
========================= */
const state = {
  me: "",
  socket: null
};

/* =========================
   INIT SOCKET
========================= */
function initSocket() {
  state.socket = io("https://buzzimessenger.onrender.com", {
    reconnection: true,
    reconnectionAttempts: 999,
    reconnectionDelay: 1000
  });

  bindSocketEvents();
}

/* =========================
   SOCKET EVENTS
========================= */
function bindSocketEvents() {
  const socket = state.socket;

  socket.on("connect", () => {
    setStatusBar("🟢 Connected");
  });

  socket.on("disconnect", () => {
    setStatusBar("🟠 Disconnected");
  });

  socket.on("connect_error", () => {
    setStatusBar("🔴 Connection error");
  });

  socket.on("login_success", (data) => {
    state.me = data.username;
    showApp();
  });

  socket.on("login_failed", (msg) => {
    setStatusText("❌ " + msg);
  });

  socket.on("register_ok", () => {
    setStatusText("✅ Registered");
  });

  socket.on("register_failed", (msg) => {
    setStatusText("❌ " + msg);
  });

  socket.on("users_update", (list) => {
    renderUsers(list);
  });

  socket.on("receive_message", (m) => {
    renderMessage(m);
  });
}

/* =========================
   UI HELPERS
========================= */
function setStatusBar(text) {
  document.getElementById("statusBar").innerText = text;
}

function setStatusText(text) {
  document.getElementById("statusText").innerText = text;
}

function showApp() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function renderUsers(list) {
  document.getElementById("users").innerHTML =
    list.map(u => "👤 " + u).join("<br>");
}

function renderMessage(m) {
  const div = document.createElement("div");
  div.className = "msg " + (m.from === state.me ? "me" : "");
  div.innerHTML = `<b>${m.from}</b><br>${m.text}`;

  const box = document.getElementById("messages");
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

/* =========================
   ACTIONS
========================= */
function login() {
  state.socket.emit("login", {
    username: document.getElementById("username").value,
    password: document.getElementById("password").value
  });

  setStatusText("Logging in...");
}

function register() {
  state.socket.emit("register", {
    username: document.getElementById("username").value,
    password: document.getElementById("password").value
  });

  setStatusText("Registering...");
}

function sendMessage() {
  state.socket.emit("send_message", {
    from: state.me,
    text: document.getElementById("messageInput").value
  });

  document.getElementById("messageInput").value = "";
}

/* =========================
   EVENT LISTENERS (NO ONCLICK)
========================= */
function bindUI() {
  document.getElementById("btnLogin")
    .addEventListener("click", login);

  document.getElementById("btnRegister")
    .addEventListener("click", register);

  document.getElementById("btnSend")
    .addEventListener("click", sendMessage);

  document.getElementById("messageInput")
    .addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
}

/* =========================
   START APP
========================= */
(function initApp() {
  initSocket();
  bindUI();
})();
</script>

</body>
</html>
