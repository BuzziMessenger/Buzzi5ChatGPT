<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSN PRO ULTRA</title>

<style>

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: Tahoma;
  background: #d7e7ff;
}

body {
  height: 100dvh;
}

/* LOGIN */
#login {
  position: fixed;
  inset: 0;
  background: linear-gradient(#2b579a, #1f3f73);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  z-index: 9999;
}

/* APP */
.app {
  display: flex;
  height: 100dvh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #f2f7ff;
  border-right: 1px solid #2b579a;
  overflow-y: auto;
}

.sidebar-header {
  background: #2b579a;
  color: white;
  padding: 10px;
}

/* USER */
.user {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px;
  margin: 5px;
  background: white;
  border-radius: 8px;
  cursor: pointer;
}

.user img {
  width: 32px;
  height: 32px;
  border-radius: 50%;
}

/* STATUS DOT */
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-left: auto;
}

.online { background: #3ad13a; }
.offline { background: gray; }

/* CHAT */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chat-header {
  background: #2b579a;
  color: white;
  padding: 10px;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  background: #eef5ff;
}

.msg {
  margin: 6px 0;
  padding: 8px;
  border-radius: 10px;
  max-width: 70%;
  font-size: 14px;
  white-space: pre-wrap;
}

.me {
  background: #cfe6ff;
  margin-left: auto;
}

.other {
  background: white;
}

/* INPUT */
.input {
  display: flex;
  border-top: 1px solid #ccc;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  font-size: 16px;
}

button {
  padding: 12px 16px;
  background: #2b579a;
  color: white;
  border: none;
}

/* typing */
#typing {
  font-size: 11px;
  color: #666;
  padding: 5px 10px;
}

/* WINK */
@keyframes wink {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); background: #fff6a6; }
  100% { transform: scale(1); }
}

.wink {
  animation: wink 0.3s;
}

/* MOBILE SAFE */
@media (max-width: 768px) {
  .sidebar { width: 40%; }
  .chat-area { width: 60%; }
}

</style>
</head>

<body>

<div id="login">
  <h2>MSN PRO ULTRA LOGIN</h2>
  <input id="name" placeholder="Username">
  <button onclick="login()">Start</button>
</div>

<div class="app">

  <div class="sidebar">
    <div class="sidebar-header">Contacts</div>
    <div id="users"></div>
  </div>

  <div class="chat-area">
    <div class="chat-header" id="header">Select chat</div>
    <div class="chat" id="chat"></div>
    <div id="typing"></div>

    <div class="input">
      <input id="msg" placeholder="Typ..." />
      <button onclick="send()">Send</button>
    </div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://buzzimessenger.onrender.com");

let me = null;
let active = null;
let chats = {};

/* sounds */
const sndSend = new Audio("https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3");
const sndRecv = new Audio("https://assets.mixkit.co/active_storage/sfx/2356/2356-preview.mp3");

/* notifications */
function notify(msg) {
  if (Notification.permission === "granted") {
    new Notification("MSN Message", { body: msg });
  }
}

Notification.requestPermission();

/* login */
function login() {
  me = document.getElementById("name").value || ("User"+Math.floor(Math.random()*1000));
  document.getElementById("login").style.display = "none";
  socket.emit("register", me);
}

/* EMOTES */
function emote(t) {
  return t
    .replace(/:\)/g,"😊")
    .replace(/;\)/g,"😉")
    .replace(/:D/g,"😄")
    .replace(/:P/g,"😛")
    .replace(/:<3/g,"❤️");
}

/* USERS */
socket.on("users", (users) => {
  const box = document.getElementById("users");
  box.innerHTML = "";

  Object.entries(users).forEach(([name, data]) => {
    if (name === me) return;

    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
      <img src="${data.avatar}">
      <div>
        <b>${name}</b><br>
        <small>${data.status}</small>
      </div>
      <div class="dot ${data.status}"></div>
    `;

    div.onclick = () => {
      active = name;
      document.getElementById("header").innerText = "Chat met " + name;

      socket.emit("get_history", {
        userA: me,
        userB: name
      });
    };

    box.appendChild(div);
  });
});

/* history */
socket.on("history", (msgs) => {
  if (!active) return;
  chats[active] = msgs;
  render();
});

/* chat */
socket.on("chat_message", (msg) => {
  const other = msg.from === me ? msg.to : msg.from;

  if (!chats[other]) chats[other] = [];
  chats[other].push(msg);

  sndRecv.play();
  notify(msg.text);

  if (active === other) {
    render();
    wink();
  }
});

/* typing */
document.getElementById("msg").addEventListener("input", () => {
  if (!active) return;

  socket.emit("typing", {
    from: me,
    to: active
  });
});

socket.on("typing", (d) => {
  if (d.from === active) {
    document.getElementById("typing").innerText =
      d.from + " is typing...";

    setTimeout(() => {
      document.getElementById("typing").innerText = "";
    }, 800);
  }
});

/* send */
function send() {
  const input = document.getElementById("msg");
  let text = input.value.trim();

  if (!text || !active) return;

  text = emote(text);

  socket.emit("chat_message", {
    from: me,
    to: active,
    text
  });

  sndSend.play();
  input.value = "";
}

/* render */
function render() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  (chats[active] || []).forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + (m.from === me ? "me" : "other");

    div.innerText = `${m.from}: ${m.text}`;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

/* wink */
function wink() {
  const box = document.querySelector(".chat-area");
  if (!box) return;

  box.classList.add("wink");
  setTimeout(() => box.classList.remove("wink"), 300);
}

</script>

</body>
</html>
