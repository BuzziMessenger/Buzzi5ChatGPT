```html
<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">

<title>Buzzi Messenger</title>

<style>

html, body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Segoe UI;
  background:#dfe9f7;
}

/* DARK MODE */
.dark{
  background:#1e1e1e;
  color:white;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#2b579a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

/* LOGIN */
#auth{
  display:none;
  justify-content:center;
  align-items:center;
  height:100dvh;
}

.card{
  background:white;
  padding:20px;
  border-radius:14px;
  width:320px;
  box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.card input,
.card select,
.card button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

/* APP */
#app{
  display:none;
  height:100dvh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#f5f7ff;
  overflow-y:auto;
}

.user{
  padding:10px;
  margin:5px;
  background:white;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
}

.header{
  background:#2b579a;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* BUBBLES */
.msg{
  max-width:70%;
  padding:10px;
  border-radius:14px;
  animation:fade .2s ease;
  word-break:break-word;
}

.me{
  background:#c9f7c2;
  align-self:flex-end;
}

.other{
  background:white;
}

.meta{
  font-size:11px;
  opacity:0.7;
  margin-top:4px;
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:white;
  gap:10px;
}

.input input{
  flex:1;
  padding:12px;
  font-size:16px;
}

/* SETTINGS */
#settings{
  display:none;
  position:fixed;
  right:10px;
  top:60px;
  width:260px;
  max-height:80vh;
  overflow-y:auto;
  background:white;
  border-radius:14px;
  padding:15px;
  z-index:999;
  box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.avatar-grid{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

/* MOBILE */
@media(max-width:768px){

  #app{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    height:180px;
    overflow-y:auto;
    overflow-x:hidden;
    display:block;
  }

  .user{
    min-width:auto;
  }

}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(5px)
  }
  to{
    opacity:1;
    transform:none
  }
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1>Buzzi Messenger</h1>
  <p>is aan het laden...</p>
</div>

<!-- LOGIN -->
<div id="auth">

  <div class="card">

    <h2>Buzzi Messenger</h2>

    <input id="user" placeholder="Gebruikersnaam">

    <input id="pass" type="password" placeholder="Wachtwoord">

    <select id="mode">
      <option value="login">Inloggen</option>
      <option value="register">Registreren</option>
    </select>

    <button onclick="login()">
      Start
    </button>

  </div>

</div>

<!-- APP -->
<div id="app">

  <div class="sidebar">
    <div id="users"></div>
  </div>

  <div class="chat">

    <div class="header">

      <span id="chatTitle">
        Buzzi Messenger
      </span>

      <div>
        <button onclick="toggleDark()">🌙</button>
        <button onclick="toggleSettings()">⚙</button>
      </div>

    </div>

    <div id="typing"></div>

    <div id="messages" class="messages"></div>

    <div class="input">

      <button onclick="toggleEmoji()">
        😊
      </button>

      <input id="msg" placeholder="Typ bericht...">

      <button onclick="send()">
        Versturen
      </button>

    </div>

  </div>

</div>

<!-- SETTINGS -->
<div id="settings">

  <h3>⚙ Instellingen</h3>

  <hr>

  <h4>Status</h4>

  <button onclick="setStatus('online')">
    🟢 Online
  </button>

  <button onclick="setStatus('offline')">
    🔴 Offline
  </button>

  <button onclick="setStatus('afwezig')">
    🌙 Afwezig
  </button>

  <button onclick="setStatus('bezet')">
    ⛔ Bezet
  </button>

  <hr>

  <h4>Thema</h4>

  <button onclick="toggleDark()">
    🌙 Donkere modus
  </button>

  <button onclick="toggleLight()">
    ☀ Lichte modus
  </button>

  <hr>

  <h4>Geluid</h4>

  <label>
    <input type="checkbox" id="soundToggle" checked>
    Berichtgeluiden
  </label>

  <br><br>

  <label>
    <input type="checkbox" id="vibrateToggle" checked>
    Trillen op mobiel
  </label>

  <hr>

  <h4>Meldingen</h4>

  <button onclick="enableNotifications()">
    🔔 Browser meldingen activeren
  </button>

  <hr>

  <h4>Profielfoto</h4>

  <div class="avatar-grid">

    <img class="avatar"
      src="https://api.dicebear.com/7.x/bottts/svg?seed=chat1"
      onclick="pickAvatar(this)"
    >

    <img class="avatar"
      src="https://api.dicebear.com/7.x/bottts/svg?seed=chat2"
      onclick="pickAvatar(this)"
    >

    <img class="avatar"
      src="https://api.dicebear.com/7.x/bottts/svg?seed=chat3"
      onclick="pickAvatar(this)"
    >

  </div>

  <hr>

  <button onclick="logout()">
    🚪 Uitloggen
  </button>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://buzzimessenger.onrender.com");

let me = null;
let active = null;
let chatCache = {};

const splash = document.getElementById("splash");
const auth = document.getElementById("auth");
const app = document.getElementById("app");

const usersBox = document.getElementById("users");
const messages = document.getElementById("messages");

/* SPLASH */
setTimeout(()=>{
  splash.style.display="none";
  auth.style.display="flex";
},1500);

/* LOGIN */
function login(){

  socket.emit("auth",{
    user:user.value,
    pass:pass.value,
    mode:mode.value
  });

}

/* LOGIN OK */
socket.on("login_ok",(u)=>{

  me = u.username;

  auth.style.display="none";
  app.style.display="flex";

  if (Notification.permission !== "granted") {
    Notification.requestPermission();
  }

});

/* USERS */
socket.on("users",(users)=>{

  usersBox.innerHTML="";

  users.forEach(u=>{

    if(!u) return;
    if(!u.username) return;
    if(u.username==="undefined") return;
    if(String(u.username).trim()==="") return;
    if(u.username===me) return;

    const d=document.createElement("div");

    d.className="user";

    d.innerHTML=`
      <img class="avatar"
      src="${u.avatar || 'https://api.dicebear.com/7.x/bottts/svg?seed=default'}">

      <div>
        ${u.username}<br>
        <small>${u.status || 'offline'}</small>
      </div>
    `;

    d.onclick=()=>openChat(u.username);

    usersBox.appendChild(d);

  });

});

/* OPEN CHAT */
function openChat(user){

  active=user;

  document.getElementById("chatTitle").innerText =
    "Chat met " + user;

  messages.innerHTML="";

  if(chatCache[user]){
    chatCache[user].forEach(renderMessage);
  }

  socket.emit("history",{a:me,b:user});

}

/* HISTORY */
socket.on("history",(msgs)=>{

  if(!active) return;

  chatCache[active]=msgs;

  messages.innerHTML="";

  msgs.forEach(renderMessage);

});

/* SEND */
function send(){

  if(!active) return;

  if(!msg.value.trim()) return;

  socket.emit("msg",{
    from:me,
    to:active,
    text:msg.value,
    time:Date.now()
  });

  msg.value="";

}

/* RENDER */
function renderMessage(m){

  const d=document.createElement("div");

  d.className="msg "+(m.from===me?"me":"other");

  d.innerHTML=`
    ${m.text}

    <div class="meta">
      ${new Date(m.time).toLocaleTimeString()}
      ${m.read ? "✓✓" : "✓"}
    </div>
  `;

  messages.appendChild(d);

  messages.scrollTop=messages.scrollHeight;

}

/* LIVE MESSAGE */
socket.on("msg",(m)=>{

  const partner=(m.from===me)?m.to:m.from;

  if(!chatCache[partner]){
    chatCache[partner]=[];
  }

  chatCache[partner].push(m);

  if(partner===active){
    renderMessage(m);
  }

  if(document.getElementById("vibrateToggle")?.checked){
    navigator.vibrate?.(100);
  }

  if(Notification.permission==="granted"){

    new Notification(
      "Nieuw bericht van "+m.from,
      {
        body:m.text
      }
    );

  }

});

/* TYPING */
msg.addEventListener("input",()=>{

  if(!active) return;

  socket.emit("typing",{
    to:active,
    from:me
  });

});

socket.on("typing",(u)=>{

  typing.innerText=u+" typt...";

  clearTimeout(window.typingTimeout);

  window.typingTimeout=setTimeout(()=>{
    typing.innerText="";
  },1000);

});

/* SETTINGS */
function toggleSettings(){

  settings.style.display =
    settings.style.display==="block"
    ?"none"
    :"block";

}

/* STATUS */
function setStatus(s){

  socket.emit("status_update",{
    user:me,
    status:s
  });

}

/* AVATAR */
function pickAvatar(el){

  socket.emit("avatar_update",{
    user:me,
    avatar:el.src
  });

}

/* DARK MODE */
function toggleDark(){

  document.body.classList.add("dark");

  localStorage.setItem("theme","dark");

}

function toggleLight(){

  document.body.classList.remove("dark");

  localStorage.setItem("theme","light");

}

if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark");
}

/* NOTIFICATIONS */
function enableNotifications(){

  if(Notification.permission!=="granted"){
    Notification.requestPermission();
  }

}

/* LOGOUT */
function logout(){
  location.reload();
}

/* EMOJI */
function toggleEmoji(){
msg.value += "😊";
}

</script>

</body>
</html>
```
