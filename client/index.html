<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buzzi Final Core</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  display:flex;
  height:100vh;
}

/* USERS */
#sidebar{
  width:260px;
  background:#f4f6ff;
  overflow:auto;
}

.user{
  padding:10px;
  margin:5px;
  background:white;
  cursor:pointer;
  border-radius:6px;
}

.status{
  font-size:11px;
  opacity:.7;
}

.online{color:green}
.offline{color:gray}

/* CHAT */
#chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

#header{
  background:#2b579a;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

#messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  padding:8px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}

.me{background:#c8f7c5;margin-left:auto}
.other{background:white}

/* INPUT */
#input{
  display:flex;
  gap:5px;
  padding:8px;
}

#msg{
  flex:1;
  padding:8px;
}

/* BUZZ */
.buzz{
  animation: shake .08s infinite;
  background:#fff3a0;
}

@keyframes shake{
  0%{transform:translate(2px)}
  50%{transform:translate(-2px)}
  100%{transform:translate(2px)}
}

/* WINK */
.wink{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:90px;
  pointer-events:none;
  animation: pop .6s ease;
}

@keyframes pop{
  0%{transform:scale(.2);opacity:0}
  50%{transform:scale(1.4);opacity:1}
  100%{transform:scale(1);opacity:0}
}

/* TYPING */
#typing{
  font-size:12px;
  padding:5px 10px;
  opacity:.7;
}
</style>

</head>

<body>

<div id="sidebar"></div>

<div id="chat">

<div id="header">
  <div>Buzzi Final Core</div>
  <button onclick="openSettings()">⚙️</button>
</div>

<div id="typing"></div>

<div id="messages"></div>

<div id="input">
  <input id="msg" placeholder="type message...">
  <button onclick="send()">Send</button>
  <button onclick="buzz()">📳</button>
  <button onclick="wink('😂')">😂</button>
</div>

</div>

<script>

const socket = io("https://jouw-backend.onrender.com");

let me = prompt("username");
let active = null;

// AUTH
socket.emit("auth",{user:me});

// USERS + ONLINE/OFFLINE FIX
socket.on("users", list=>{
  sidebar.innerHTML="";

  list.forEach(u=>{
    let d=document.createElement("div");
    d.className="user";

    d.innerHTML=`
      <b>${u.username}</b>
      <div class="status ${u.status}">${u.status}</div>
    `;

    d.onclick=()=>active=u.username;

    sidebar.appendChild(d);
  });
});

// MESSAGE CORE
socket.on("msg", m=>{
  let d=document.createElement("div");
  d.className="msg "+(m.from===me?"me":"other");
  d.innerText=m.text;

  messages.appendChild(d);
  messages.scrollTop=messages.scrollHeight;
});

function send(){
  if(!active) return;

  socket.emit("msg",{
    from:me,
    to:active,
    text:msg.value
  });

  msg.value="";
}

// BUZZ
function buzz(){
  if(!active) return;

  socket.emit("buzz",{from:me,to:active});

  document.body.classList.add("buzz");
  setTimeout(()=>document.body.classList.remove("buzz"),300);
}

socket.on("buzz",()=>buzz());

// WINK
function wink(e){
  if(!active) return;

  socket.emit("wink",{to:active,emoji:e});

  let d=document.createElement("div");
  d.className="wink";
  d.innerText=e;
  document.body.appendChild(d);

  setTimeout(()=>d.remove(),800);
}

socket.on("wink",e=>wink(e));

// TYPING
msg.addEventListener("input",()=>{
  if(active) socket.emit("typing",{to:active,from:me});
});

socket.on("typing",(from)=>{
  typing.innerText = from + " is typing...";
  setTimeout(()=>typing.innerText="",1200);
});

// SETTINGS (LOCKED CORE PLACEHOLDER)
function openSettings(){
  alert(
    "Settings (core locked):\n- status\n- sounds (coming next safe module)\n- UI options (next layer)"
  );
}

</script>

</body>
</html>
