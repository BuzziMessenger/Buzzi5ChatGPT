<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>MSN v3</title>

<style>
body {
  margin: 0;
  font-family: Tahoma;
  background: #cfe3ff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.app {
  width: 820px;
  height: 620px;
  display: flex;
  background: white;
  border: 1px solid #2b579a;
}

.left {
  width: 260px;
  background: #eaf3ff;
  border-right: 1px solid #2b579a;
  padding: 10px;
}

.user {
  padding: 6px;
  margin: 5px 0;
  background: white;
  cursor: pointer;
  border: 1px solid #ccc;
}

.active {
  background: #d7ebff;
}

.right {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  background: #2b579a;
  color: white;
  padding: 10px;
}

.chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  background: #f9fbff;
}

.msg {
  margin: 5px 0;
  padding: 6px;
  max-width: 75%;
}

.me {
  background: #d7ebff;
  margin-left: auto;
}

.other {
  background: #eee;
}

.system {
  text-align: center;
  font-size: 12px;
  color: gray;
}

.typing {
  font-size: 12px;
  color: gray;
  padding: 5px;
}

.input {
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-top: 1px solid #ccc;
}

button {
  padding: 10px;
  border: none;
  background: #2b579a;
  color: white;
}
</style>
</head>

<body>

<div class="app">

  <div class="left">
    <h4>Online</h4>
    <div id="users"></div>
  </div>

  <div class="right">

    <div class="header" id="header">Select chat</div>

    <div class="chat" id="chat"></div>

    <div id="typing" class="typing"></div>

    <div class="input">
      <input id="input" placeholder="Typ..." />
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://buzzimessenger.onrender.com");

let me = prompt("Username:");
let active = null;
let chats = {};

socket.emit("register", me);

// USERS
socket.on("users", (list) => {
  const box = document.getElementById("users");
  box.innerHTML = "";

  list.forEach(u => {
    if (u === me) return;

    const div = document.createElement("div");
    div.className = "user";
    div.innerText = u;

    if (u === active) div.classList.add("active");

    div.onclick = () => {
      active = u;
      document.getElementById("header").innerText = "Chat met " + u;

      if (!chats[u]) chats[u] = [];

      render();
    };

    box.appendChild(div);
  });
});

// MESSAGE HISTORY
socket.on("message_history", (msgs) => {
  msgs.forEach(m => handleMessage(m));
});

// CHAT MESSAGE
socket.on("chat_message", (msg) => {
  handleMessage(msg);
});

// TYPING
socket.on("typing", (data) => {
  if (data.from === active) {
    document.getElementById("typing").innerText =
      data.from + " is aan het typen...";
    setTimeout(() => {
      document.getElementById("typing").innerText = "";
    }, 1000);
  }
});

// HANDLE MESSAGE
function handleMessage(msg) {
  const other = msg.from === me ? msg.to : msg.from;

  if (!chats[other]) chats[other] = [];

  chats[other].push({
    text: `[${new Date(msg.time).toLocaleTimeString()}] ${msg.from}: ${msg.text}`,
    type: msg.from === me ? "me" : "other"
  });

  if (active === other) render();
}

// SEND
function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();

  if (!text || !active) return;

  socket.emit("chat_message", {
    from: me,
    to: active,
    text
  });

  input.value = "";
}

// typing event
document.getElementById("input").addEventListener("input", () => {
  if (!active) return;

  socket.emit("typing", {
    from: me,
    to: active
  });
});

// RENDER
function render() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  const msgs = chats[active] || [];

  msgs.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + m.type;
    div.innerText = m.text;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
