<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<title>Buzzi Messenger</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
header {
  background: #111827;
  color: white;
  padding: 14px;
  font-size: 18px;
  font-weight: bold;
  text-align: center;
  border-bottom: 1px solid #1f2937;
}

/* CHAT AREA */
#chat {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* MESSAGE BUBBLES */
.msg {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.4;
  word-wrap: break-word;
}

/* OWN MESSAGE */
.me {
  align-self: flex-end;
  background: #2563eb;
  color: white;
  border-bottom-right-radius: 5px;
}

/* OTHER MESSAGE */
.other {
  align-self: flex-start;
  background: #1f2937;
  color: #e5e7eb;
  border-bottom-left-radius: 5px;
}

/* INPUT BAR */
.input-area {
  display: flex;
  padding: 12px;
  background: #111827;
  border-top: 1px solid #1f2937;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: none;
  outline: none;
  background: #1f2937;
  color: white;
}

button {
  margin-left: 10px;
  padding: 12px 18px;
  border: none;
  border-radius: 20px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

/* SCROLLBAR */
#chat::-webkit-scrollbar {
  width: 6px;
}
#chat::-webkit-scrollbar-thumb {
  background: #374151;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>Buzzi Messenger 💬</header>

<div id="chat"></div>

<div class="input-area">
  <input id="msgInput" placeholder="Typ een bericht..." />
  <button onclick="sendMessage()">Send</button>
</div>

<!-- Socket.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io("https://buzzimessenger.onrender.com");

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");

let myName = "You";

// RECEIVE MESSAGE
socket.on("receive_message", (msg) => {
  const div = document.createElement("div");

  const isMe = msg.from === myName;

  div.className = "msg " + (isMe ? "me" : "other");
  div.innerHTML = `
    <div>${msg.text}</div>
    <div style="font-size:10px;opacity:0.6;margin-top:4px;">
      ${msg.from}
    </div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
});

// SEND MESSAGE
function sendMessage() {
  const text = input.value;
  if (!text) return;

  socket.emit("send_message", {
    from: myName,
    to: "all",
    text: text
  });

  input.value = "";
}
</script>

</body>
</html>
