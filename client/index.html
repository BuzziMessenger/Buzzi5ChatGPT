<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>MSN REAL LEGACY</title>

<style>
body {
  margin: 0;
  font-family: Tahoma;
  background: #cfe3ff;
  height: 100vh;
  display: flex;
}

/* CONTACTS */
.left {
  width: 280px;
  background: #eaf3ff;
  border-right: 1px solid #2b579a;
  padding: 10px;
  overflow-y: auto;
}

.user {
  display: flex;
  gap: 8px;
  padding: 8px;
  margin: 6px 0;
  background: white;
  border: 1px solid #ccc;
  cursor: pointer;
  align-items: center;
}

.user.active {
  background: #d7ebff;
  border: 1px solid #2b579a;
}

.avatar {
  width: 34px;
  height: 34px;
  border-radius: 6px;
}

/* CHAT WINDOW */
.chatWindow {
  position: absolute;
  bottom: 0;
  right: 20px;
  width: 380px;
  height: 450px;
  background: white;
  border: 1px solid #2b579a;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 15px rgba(0,0,0,0.25);
  transition: transform 0.1s;
}

.header {
  background: #2b579a;
  color: white;
  padding: 8px;
}

.chat {
  flex: 1;
  padding: 8px;
  overflow-y: auto;
  background: #f9fbff;
}

.msg {
  margin: 5px 0;
  padding: 6px;
  max-width: 80%;
  border-radius: 4px;
}

.me { background: #d7ebff; margin-left: auto; }
.other { background: #eee; }

.input {
  display: flex;
  border-top: 1px solid #ccc;
}

input {
  flex: 1;
  padding: 8px;
  border: none;
}

button {
  background: #2b579a;
  color: white;
  border: none;
  padding: 8px;
  cursor: pointer;
}

#typing {
  font-size: 11px;
  color: gray;
  padding: 3px 8px;
}

.statusbar {
  padding: 5px;
  background: #f5f5f5;
  border-bottom: 1px solid #ccc;
}

/* LOGIN */
#loginScreen {
  position: fixed;
  inset: 0;
  background: #2b579a;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  z-index: 9999;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>MSN Messenger</h2>
  <input id="loginInput" placeholder="Username..." style="padding:10px;">
  <button onclick="login()" style="margin-top:10px; padding:10px;">Login</button>
</div>

<!-- CONTACTS -->
<div class="left">
  <h4>Contacts</h4>
  <div id="users"></div>
</div>

<!-- CHAT WINDOW -->
<div class="chatWindow" id="chatWindow" style="display:none;">
  <div class="header" id="header">Chat</div>

  <div class="statusbar">
    <input id="statusText" placeholder="Set status..." />
  </div>

  <div class="chat" id="chat"></div>
  <div id="typing"></div>

  <div class="input">
    <input id="input" placeholder="Typ..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<!-- SOUNDS -->
<audio id="sndSend" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
<audio id="sndRecv" src="https://assets.mixkit.co/active_storage/sfx/2356/2356-preview.mp3"></audio>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://buzzimessenger.onrender.com");

let me = null;
let active = null;
let chats = {};

function login() {
  me = document.getElementById("loginInput").value;

  if (!me) return;

  document.getElementById("loginScreen").style.display = "none";
  socket.emit("register", me);
}

/* EMOJIS */
function emoji(t) {
  return t
    .replaceAll(":)", "😊")
    .replaceAll(":(", "😢")
    .replaceAll(":D", "😄")
    .replaceAll("<3", "❤️")
    .replaceAll("lol", "😂");
}

/* USERS */
socket.on("users", (users) => {
  const box = document.getElementById("users");
  box.innerHTML = "";

  Object.entries(users).forEach(([name, data]) => {
    if (name === me) return;

    const div = document.createElement("div");
    div.className = "user " + (active === name ? "active" : "");

    div.innerHTML = `
      <img class="avatar" src="${data.avatar}">
      <div>
        <b>${name}</b><br>
        <small>${data.status} - ${data.text}</small>
      </div>
    `;

    div.onclick = () => {
      active = name;

      document.getElementById("chatWindow").style.display = "flex";
      document.getElementById("header").innerText = "Chat met " + name;

      socket.emit("get_history", {
        userA: me,
        userB: name
      });
    };

    box.appendChild(div);
  });
});

/* HISTORY */
socket.on("history", (msgs) => {
  if (!active) return;
  chats[active] = msgs;
  render();
});

/* CHAT */
socket.on("chat_message", (msg) => {
  const other = msg.from === me ? msg.to : msg.from;

  if (!chats[other]) chats[other] = [];
  chats[other].push(msg);

  document.getElementById("sndRecv").play();

  if (active === other) render();
});

/* SEND */
function send() {
  const input = document.getElementById("input");
  let text = input.value.trim();

  if (!text || !active) return;

  socket.emit("chat_message", {
    from: me,
    to: active,
    text: emoji(text)
  });

  document.getElementById("sndSend").play();

  input.value = "";
}

/* STATUS */
document.getElementById("statusText").addEventListener("input", () => {
  socket.emit("set_status_text", {
    user: me,
    text: document.getElementById("statusText").value
  });
});

/* RENDER */
function render() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  (chats[active] || []).forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + (m.from === me ? "me" : "other");
    div.innerText = `${m.from}: ${m.text}`;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
