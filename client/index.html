<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSN NEXT LEVEL</title>

<style>
body {
  margin: 0;
  font-family: Tahoma;
  background: #cfe3ff;
  display: flex;
  height: 100vh;
}

/* CONTACTS */
.left {
  width: 280px;
  background: #eaf3ff;
  border-right: 1px solid #2b579a;
  padding: 10px;
  overflow-y: auto;
}

.user {
  background: white;
  margin: 6px 0;
  padding: 8px;
  cursor: pointer;
  position: relative;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  position: absolute;
  right: 10px;
  top: 15px;
}

.online { background: #3ad13a; }
.offline { background: gray; }

/* CHAT */
.chatBox {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.header {
  background: #2b579a;
  color: white;
  padding: 8px;
}

.chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  background: #f9fbff;
}

.msg {
  margin: 5px 0;
  padding: 6px;
  max-width: 70%;
  border-radius: 6px;
  font-size: 14px;
}

.me {
  background: #d7ebff;
  margin-left: auto;
}

.other {
  background: #eee;
}

.time {
  font-size: 10px;
  color: #666;
  margin-top: 3px;
}

.input {
  display: flex;
  border-top: 1px solid #ccc;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
}

button {
  padding: 10px;
  background: #2b579a;
  color: white;
  border: none;
}

/* LOGIN */
#login {
  position: fixed;
  inset: 0;
  background: #2b579a;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  z-index: 999;
}

/* TYPING */
#typing {
  font-size: 11px;
  color: #666;
  padding-left: 8px;
}

/* UNREAD */
.user.unread {
  border-left: 4px solid #2b579a;
  background: #e6f0ff;
}

/* MOBILE */
@media (max-width: 768px) {
  body { flex-direction: column; }

  .left {
    width: 100%;
    height: 35vh;
  }

  .chatBox {
    height: 65vh;
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>MSN LOGIN</h2>
  <input id="name" placeholder="Username">
  <button onclick="login()">Start</button>
</div>

<!-- CONTACTS -->
<div class="left">
  <h3>Contacts</h3>
  <div id="users"></div>
</div>

<!-- CHAT -->
<div class="chatBox">
  <div class="header" id="header">Select chat</div>
  <div class="chat" id="chat"></div>
  <div id="typing"></div>

  <div class="input">
    <input id="msg" placeholder="Typ..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://buzzimessenger.onrender.com");

let me = null;
let active = null;
let chats = {};

/* LOGIN */
function login() {
  me = document.getElementById("name").value || ("User" + Math.floor(Math.random()*1000));
  document.getElementById("login").style.display = "none";
  socket.emit("register", me);
}

/* USERS */
socket.on("users", (users) => {
  const box = document.getElementById("users");
  box.innerHTML = "";

  Object.entries(users).forEach(([name, data]) => {
    if (name === me) return;

    const div = document.createElement("div");
    div.className = "user";

    let status = data.status;

    if (data.status === "offline" && data.lastSeen) {
      const mins = Math.floor((Date.now() - data.lastSeen) / 60000);
      status = `offline (${mins}m ago)`;
    }

    div.innerHTML = `
      <b>${name}</b><br>
      <small>${status} - ${data.text}</small>
    `;

    const dot = document.createElement("div");
    dot.className = "dot " + (data.status === "online" ? "online" : "offline");
    div.appendChild(dot);

    div.onclick = () => {
      active = name;
      div.classList.remove("unread");

      document.getElementById("header").innerText = "Chat met " + name;

      socket.emit("get_history", {
        userA: me,
        userB: name
      });
    };

    box.appendChild(div);
  });
});

/* HISTORY */
socket.on("history", (msgs) => {
  if (!active) return;
  chats[active] = msgs;
  render();
});

/* CHAT */
socket.on("chat_message", (msg) => {
  const other = msg.from === me ? msg.to : msg.from;

  if (!chats[other]) chats[other] = [];
  chats[other].push(msg);

  if (active !== other) {
    const el = [...document.querySelectorAll(".user")]
      .find(u => u.innerText.includes(other));
    if (el) el.classList.add("unread");
  }

  if (active === other) {
    render();
    nudge();
  }
});

/* SEND */
function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text || !active) return;

  socket.emit("chat_message", {
    from: me,
    to: active,
    text
  });

  input.value = "";
}

/* TYPING */
document.getElementById("msg").addEventListener("input", () => {
  if (!active) return;

  socket.emit("typing", {
    from: me,
    to: active
  });
});

socket.on("typing", (d) => {
  if (d.from === active) {
    document.getElementById("typing").innerText =
      d.from + " is typing...";

    setTimeout(() => {
      document.getElementById("typing").innerText = "";
    }, 800);
  }
});

/* RENDER */
function render() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  (chats[active] || []).forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + (m.from === me ? "me" : "other");

    const time = new Date(m.time || Date.now()).toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit'
    });

    div.innerHTML = `
      <div>${m.from}: ${m.text}</div>
      <div class="time">${time}</div>
    `;

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

/* NUDGE */
function nudge() {
  const box = document.querySelector(".chatBox");
  if (!box) return;

  box.classList.add("shake");
  setTimeout(() => box.classList.remove("shake"), 200);
}
</script>

</body>
</html>
