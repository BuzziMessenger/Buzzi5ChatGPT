<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<title>Buzzi MSN 2005</title>

<style>
body {
  margin: 0;
  font-family: Tahoma, Arial;
  background: #d6dbe5;
}

/* WINDOW */
.window {
  width: 900px;
  height: 600px;
  margin: 30px auto;
  display: flex;
  border: 2px solid #3a6ea5;
  background: #eceff5;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: #dfe7f2;
  border-right: 1px solid #9bb3d3;
}

.sidebar-header {
  background: #2b579a;
  color: white;
  padding: 10px;
  font-weight: bold;
}

.user {
  padding: 8px;
  display: flex;
  align-items: center;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 8px;
  background: #999;
}

.online {
  background: #00c853;
  box-shadow: 0 0 6px #00c853;
}

/* CHAT */
.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chat-header {
  background: #2b579a;
  color: white;
  padding: 10px;
}

#messages {
  flex: 1;
  background: white;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  margin-bottom: 8px;
}

/* INPUT */
.input-area {
  display: flex;
  padding: 10px;
  background: #dfe7f2;
}

input {
  flex: 1;
  padding: 8px;
}

button {
  margin-left: 5px;
}
</style>
</head>

<body>

<div class="window">

  <!-- USERS -->
  <div class="sidebar">
    <div class="sidebar-header">🟢 Online</div>
    <div id="users"></div>
  </div>

  <!-- CHAT -->
  <div class="chat">
    <div class="chat-header">MSN 2005 Chat</div>

    <div id="messages"></div>

    <div class="input-area">
      <input id="msgInput" />
      <button onclick="sendMessage()">Send</button>
      <button onclick="nudge()">📳</button>
      <button onclick="toggleEmoji()">😊</button>
    </div>
  </div>

</div>

<!-- EMOJI BOX -->
<div id="emojis" style="display:none;position:fixed;bottom:80px;right:20px;background:white;border:1px solid #999;padding:5px;">
  <span onclick="addEmoji('😊')">😊</span>
  <span onclick="addEmoji('😂')">😂</span>
  <span onclick="addEmoji('😍')">😍</span>
  <span onclick="addEmoji('😎')">😎</span>
</div>

<!-- SOCKET -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io("https://buzzimessenger.onrender.com");

const messages = document.getElementById("messages");
const users = document.getElementById("users");
const input = document.getElementById("msgInput");

let myName = prompt("Naam?");
socket.emit("add_user", myName);

/* MESSAGES */
socket.on("receive_message", (msg) => {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `<b>${msg.from}:</b> ${msg.text}`;
  messages.appendChild(div);
});

/* USERS */
socket.on("update_users", (list) => {
  users.innerHTML = "";

  list.forEach(u => {
    const div = document.createElement("div");
    div.className = "user";
    div.innerHTML = `<div class="dot online"></div>${u}`;
    users.appendChild(div);
  });
});

/* NUDE */
socket.on("nudge", (from) => {
  alert(from + " nudged you!");
  document.body.style.transform = "translateX(10px)";
  setTimeout(() => document.body.style.transform = "translateX(0)", 100);
});

/* SEND */
function sendMessage() {
  socket.emit("send_message", {
    from: myName,
    text: input.value
  });
  input.value = "";
}

/* NUDE BTN */
function nudge() {
  socket.emit("nudge", myName);
}

/* EMOJI */
function toggleEmoji() {
  const e = document.getElementById("emojis");
  e.style.display = e.style.display === "block" ? "none" : "block";
}

function addEmoji(e) {
  input.value += e;
}
</script>

</body>
</html>
