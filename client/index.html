<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MSN Clone</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
});

<style>
body{
  margin:0;
  font-family:Segoe UI;
  display:flex;
  height:100vh;
  background:#eaf1ff;
}

/* CONTACT LIST */
#contacts{
  width:250px;
  background:#dfe8ff;
  overflow:auto;
  padding:10px;
}

.contact{
  background:white;
  padding:10px;
  margin:5px;
  cursor:pointer;
  border-radius:6px;
}

/* CHAT AREA */
#chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

#header{
  background:#2b579a;
  color:white;
  padding:10px;
}

#msgs{
  flex:1;
  padding:10px;
  overflow:auto;
}

.msg{
  padding:8px;
  margin:5px;
  border-radius:8px;
  max-width:60%;
}

.me{background:#c7f7c7;margin-left:auto}
.other{background:white}

/* INPUT */
#input{
  display:flex;
  padding:10px;
  gap:5px;
}

#input input{
  flex:1;
}

/* MSN EFFECTS */
.buzz{
  animation:shake .1s infinite;
  background:#fff59d;
}

@keyframes shake{
  0%{transform:translate(2px)}
  50%{transform:translate(-2px)}
}

#wink{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:100px;
}
</style>
</head>

<body>

<div id="contacts"></div>

<div id="chat">
  <div id="header">MSN Clone</div>

  <div id="msgs"></div>

  <div id="input">
    <input id="msg">
    <button onclick="send()">Send</button>
    <button onclick="buzz()">Buzz</button>
    <button onclick="wink('😂')">😂</button>
  </div>
</div>

<script>

const socket = io();

const me = prompt("username");
let active = null;

socket.emit("login", me);

// USERS
socket.on("users", list=>{
  contacts.innerHTML="";

  list.forEach(u=>{
    let d=document.createElement("div");
    d.className="contact";
    d.innerHTML=`${u.username} (${u.status})`;
    d.onclick=()=>active=u.username;
    contacts.appendChild(d);
  });
});

// HISTORY
socket.on("history", data=>{
  data.forEach(addMsg);
});

// MSG
socket.on("msg", addMsg);

function addMsg(m){
  let d=document.createElement("div");
  d.className="msg "+(m.from===me?"me":"other");
  d.innerText=m.text;
  msgs.appendChild(d);
}

// SEND
function send(){
  socket.emit("msg",{
    from:me,
    to:active,
    text:msg.value
  });
  msg.value="";
}

// BUZZ
function buzz(){
  socket.emit("buzz",{to:active});
  document.body.classList.add("buzz");
  setTimeout(()=>document.body.classList.remove("buzz"),300);
}

socket.on("buzz",buzz);

// WINK
function wink(e){
  socket.emit("wink",{to:active,emoji:e});

  let d=document.createElement("div");
  d.id="wink";
  d.innerText=e;
  document.body.appendChild(d);

  setTimeout(()=>d.remove(),800);
}

socket.on("wink",e=>wink(e));

</script>

</body>
</html>
