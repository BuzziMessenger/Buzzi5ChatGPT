<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Buzzi Messenger</title>

<style>
body {
  margin:0;
  font-family: Segoe UI, Arial;
  background: linear-gradient(#dbe9ff, #f5f9ff);
}

/* STATUS */
#statusBar {
  position: fixed;
  top:0;
  width:100%;
  background:#1b1b1b;
  color:white;
  font-size:12px;
  padding:6px;
  z-index:999;
}

/* LOGIN */
#login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input {
  margin:5px;
  padding:10px;
  width:200px;
}

/* APP */
#app {
  display:none;
  height:100vh;
}

.header {
  background:#2b579a;
  color:white;
  padding:10px;
  font-weight:bold;
}

.container {
  display:flex;
  height:calc(100vh - 40px);
}

/* USERS */
.users {
  width:220px;
  background:#1e3f73;
  color:white;
  padding:10px;
  overflow-y:auto;
}

/* CHAT */
.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages {
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg {
  background:white;
  margin:5px;
  padding:8px;
  border-radius:10px;
  max-width:60%;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.me {
  background:#cfe3ff;
  margin-left:auto;
}

.input {
  display:flex;
  padding:10px;
  background:#fff;
}

button {
  padding:10px;
  background:#2b579a;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover {
  background:#1f447a;
}
</style>
</head>

<body>

<div id="statusBar">⚪ Connecting...</div>

<!-- LOGIN -->
<div id="login">
  <h2>💙 Buzzi Messenger</h2>

  <input id="user" placeholder="username" />
  <input id="pass" type="password" placeholder="password" />

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>

  <p id="status"></p>
</div>

<!-- APP -->
<div id="app">

  <div class="header">💙 Buzzi Messenger (MSN Style)</div>

  <div class="container">

    <div class="users" id="users"></div>

    <div class="chat">

      <div class="messages" id="messages"></div>

      <div class="input">
        <input id="msg" placeholder="Type message..." />
        <button onclick="send()">Send</button>
      </div>

    </div>

  </div>

</div>

<!-- SOCKET -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
/* =========================
   SOCKET (SINGLE INSTANCE)
========================= */
const socket = io("https://buzzimessenger.onrender.com", {
  reconnection: true,
  reconnectionAttempts: 999,
  reconnectionDelay: 1000
});

/* STATE */
let me = "";

/* STATUS BAR */
function setStatusBar(text) {
  document.getElementById("statusBar").innerText = text;
}

/* LOGIN */
function login() {
  socket.emit("login", {
    username: user.value,
    password: pass.value
  });

  status.innerText = "Logging in...";
}

/* REGISTER */
function register() {
  socket.emit("register", {
    username: user.value,
    password: pass.value
  });

  status.innerText = "Registering...";
}

/* SEND MESSAGE */
function send() {
  if (!me) return;

  socket.emit("send_message", {
    from: me,
    text: msg.value
  });

  msg.value = "";
}

/* =========================
   SOCKET EVENTS
========================= */

socket.on("connect", () => {
  setStatusBar("🟢 Connected");
});

socket.on("disconnect", () => {
  setStatusBar("🟠 Disconnected...");
});

socket.on("connect_error", () => {
  setStatusBar("🔴 Connection error...");
});

/* LOGIN SUCCESS */
socket.on("login_success", (data) => {
  me = data.username;

  login.style.display = "none";
  app.style.display = "block";

  setStatus(" ");
});

/* LOGIN FAIL */
socket.on("login_failed", (msg) => {
  status.innerText = "❌ " + msg;
});

/* REGISTER */
socket.on("register_ok", () => {
  status.innerText = "✅ Registered! Now login.";
});

socket.on("register_failed", (msg) => {
  status.innerText = "❌ " + msg;
});

/* USERS */
socket.on("users_update", (list) => {
  users.innerHTML = list.map(u => "👤 " + u).join("<br>");
});

/* MESSAGES */
socket.on("receive_message", (m) => {
  const div = document.createElement("div");
  div.className = "msg " + (m.from === me ? "me" : "");

  div.innerHTML = "<b>" + m.from + "</b><br>" + m.text;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
});
</script>

</body>
</html>
