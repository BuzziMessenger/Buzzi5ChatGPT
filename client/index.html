<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buzzi Messenger 11.1 FIX</title>

<style>
body {
  margin:0;
  font-family: Segoe UI;
  background:#eaf2ff;
}

/* LOGIN */
#login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input {
  margin:5px;
  padding:10px;
}

/* APP */
#app {
  display:none;
  height:100vh;
}

.header {
  background:#2b579a;
  color:white;
  padding:10px;
}

.container {
  display:flex;
  height:calc(100vh - 40px);
}

.users {
  width:220px;
  background:#1e3f73;
  color:white;
  padding:10px;
}

.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages {
  flex:1;
  padding:10px;
  overflow:auto;
}

.msg {
  background:white;
  margin:5px;
  padding:8px;
  border-radius:10px;
  max-width:60%;
}

.me { background:#cfe3ff; margin-left:auto; }

.input {
  display:flex;
  padding:10px;
}

button {
  padding:10px;
  background:#2b579a;
  color:white;
  border:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Buzzi Messenger Login</h2>

  <input id="user" placeholder="username">
  <input id="pass" type="password" placeholder="password">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>

  <p id="status"></p>
</div>

<!-- APP -->
<div id="app">

  <div class="header">💙 Buzzi Messenger FIXED</div>

  <div class="container">

    <div class="users" id="users"></div>

    <div class="chat">

      <div class="messages" id="messages"></div>

      <div class="input">
        <input id="msg">
        <button onclick="send()">Send</button>
      </div>

    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io("https://buzzimessenger.onrender.com");

let me = "";

/* STATUS TEXT */
function setStatus(txt) {
  document.getElementById("status").innerText = txt;
}

/* REGISTER */
function register() {
  socket.emit("register", {
    username: user.value,
    password: pass.value
  });

  setStatus("Registering...");
}

/* LOGIN */
function login() {
  socket.emit("login", {
    username: user.value,
    password: pass.value
  });

  setStatus("Logging in...");
}

/* SUCCESS */
socket.on("login_success", (data) => {
  me = data.username;

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  setStatus("");
});

/* FAIL */
socket.on("login_failed", (msg) => {
  setStatus("❌ " + msg);
});

socket.on("register_ok", () => {
  setStatus("✅ Registered! You can login now");
});

socket.on("register_failed", (msg) => {
  setStatus("❌ " + msg);
});

/* USERS */
socket.on("users_update", (list) => {
  users.innerHTML = list.map(u => `<div>👤 ${u}</div>`).join("");
});

/* SEND */
function send() {
  socket.emit("send_message", {
    from: me,
    text: msg.value
  });

  msg.value = "";
}

/* RECEIVE */
socket.on("receive_message", (m) => {
  const div = document.createElement("div");
  div.className = "msg " + (m.from === me ? "me" : "");

  div.innerHTML = `<b>${m.from}</b><br>${m.text}`;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
});
</script>

</body>
</html>
