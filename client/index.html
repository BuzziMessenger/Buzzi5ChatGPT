<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buzzi v1.1</title>

<style>

body {
  margin:0;
  font-family:Segoe UI;
  background:#d7e7ff;
  height:100vh;
}

/* AUTH */
#auth {
  position:fixed;
  inset:0;
  background:#1f3f73;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card {
  width:340px;
  background:white;
  padding:20px;
  border-radius:10px;
}

input {
  width:100%;
  padding:10px;
  margin:6px 0;
}

button {
  width:100%;
  padding:10px;
  background:#2b579a;
  color:white;
  border:none;
}

.switch {
  text-align:center;
  font-size:12px;
  margin-top:10px;
  cursor:pointer;
  color:#2b579a;
}

/* APP */
.app {
  display:none;
  height:100vh;
  display:flex;
}

.sidebar {
  width:260px;
  background:#f5f8ff;
}

.header {
  background:#2b579a;
  color:white;
  padding:10px;
}

.user {
  padding:10px;
  margin:5px;
  background:white;
  cursor:pointer;
}

.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.box {
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg {
  background:white;
  padding:8px;
  margin:5px;
}

.me {
  background:#cfe6ff;
  margin-left:auto;
}

.input {
  display:flex;
}

.input input {
  flex:1;
  padding:10px;
}

</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <div class="card">

    <h3 id="title">Login</h3>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="auth()">Login</button>

    <div class="switch" onclick="toggleMode()">
      Nog geen account? Register hier
    </div>

  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="sidebar">
    <div class="header">Contacten</div>
    <div id="users"></div>
  </div>

  <div class="chat">
    <div class="header" id="chatTitle">Select chat</div>
    <div class="box" id="box"></div>

    <div class="input">
      <input id="msg">
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://buzzimessenger.onrender.com");

let me = null;
let active = null;
let mode = "login";

/* TOGGLE */
function toggleMode(){

  const title = document.getElementById("title");

  mode = mode === "login" ? "register" : "login";

  title.innerText = mode === "login" ? "Login" : "Register";
}

/* AUTH */
function auth(){

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  socket.emit("register", { user, pass, mode });
}

/* LOGIN SUCCESS */
socket.on("login_success", (u) => {

  me = u.username;

  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "flex";
});

/* USERS */
socket.on("users", (users) => {

  const box = document.getElementById("users");
  box.innerHTML = "";

  users.forEach(u => {

    /* 🔴 FIX: NO UNDEFINED USERS */
    if (!u || !u.username) return;
    if (u.username === me) return;

    const d = document.createElement("div");
    d.className = "user";
    d.innerText = u.username;

    d.onclick = () => {
      active = u.username;
      socket.emit("get_history", { userA: me, userB: u.username });
      document.getElementById("chatTitle").innerText = "Chat met " + u.username;
    };

    box.appendChild(d);
  });
});

/* HISTORY */
socket.on("history", render);

socket.on("chat_message", () => {
  if(active){
    socket.emit("get_history", { userA: me, userB: active });
  }
});

/* SEND */
function send(){

  const i = document.getElementById("msg");
  if(!i.value || !active) return;

  socket.emit("chat_message", {
    from: me,
    to: active,
    text: i.value
  });

  i.value = "";
}

/* RENDER */
function render(msgs){

  const box = document.getElementById("box");
  box.innerHTML = "";

  msgs.forEach(m => {

    const d = document.createElement("div");
    d.className = "msg " + (m.from === me ? "me" : "");
    d.innerText = m.from + ": " + m.text;

    box.appendChild(d);
  });

}

</script>

</body>
</html>
