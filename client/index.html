<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Buzzi Messenger V2</title>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  background:#d7e7ff;
  height:100vh;
  overflow:hidden;
}

/* LOGIN */
#auth{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#1f3f73;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  width:280px;
}

/* APP */
.app{
  display:none;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:#f5f8ff;
  overflow:auto;
}

.header{
  background:#2b579a;
  color:white;
  padding:10px;
}

.user{
  padding:10px;
  margin:5px;
  background:white;
  cursor:pointer;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.box{
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  padding:10px;
  border-radius:12px;
  max-width:60%;
}

.me{
  background:#cfe6ff;
  align-self:flex-end;
}

.other{
  background:white;
}

.input{
  display:flex;
  padding:10px;
  background:white;
}

.input input{
  flex:1;
  padding:10px;
}

/* MOBILE FIX */
@media (max-width: 768px){

  .app{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    display:flex;
    overflow-x:auto;
    height:90px;
  }

  .user{
    min-width:120px;
    text-align:center;
  }

}

</style>
</head>

<body>

<div id="auth">
  <div class="card">
    <input id="user" placeholder="username"><br><br>
    <input id="pass" type="password" placeholder="password"><br><br>

    <select id="mode">
      <option value="login">login</option>
      <option value="register">register</option>
    </select><br><br>

    <button onclick="login()">Start</button>
  </div>
</div>

<div id="app" class="app">

  <div class="sidebar">
    <div class="header">Users</div>
    <div id="users"></div>
  </div>

  <div class="chat">

    <div class="header">Chat</div>

    <div id="box" class="box"></div>

    <div class="input">
      <input id="msg">
      <button onclick="send()">Versturen</button>
    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://buzzimessenger.onrender.com");

let me = null;
let active = null;

function login(){
  socket.emit("register",{
    user: user.value,
    pass: pass.value,
    mode: mode.value
  });
}

socket.on("login_success",(u)=>{
  me = u.username;
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "flex";
});

socket.on("login_error",(e)=>{
  alert("Login error: " + e);
});

socket.on("users",(users)=>{
  const box = document.getElementById("users");
  box.innerHTML = "";

  users.forEach(u=>{
    if(u.username === me) return;

    const d = document.createElement("div");
    d.className = "user";
    d.innerText = u.username;

    d.onclick = ()=>{
      active = u.username;
      socket.emit("get_history",{userA:me,userB:active});
    };

    box.appendChild(d);
  });
});

socket.on("history",(msgs)=>{
  const box = document.getElementById("box");
  box.innerHTML = "";

  msgs.forEach(m=>{
    const d = document.createElement("div");
    d.className = "msg " + (m.from === me ? "me" : "other");
    d.innerText = m.text;
    box.appendChild(d);
  });
});

function send(){
  socket.emit("chat_message",{
    from:me,
    to:active,
    text:msg.value,
    time:Date.now()
  });

  msg.value = "";
}

</script>

</body>
</html>
