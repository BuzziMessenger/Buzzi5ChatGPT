<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSN MOBILE FIXED</title>

<style>

/* =========================
   BASE RESET (CRUCIAAL FIX)
========================= */

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: Tahoma;
}

/* FIX VOOR MOBIEL VIEWPORT BUG */
body {
  height: 100dvh;
  display: flex;
  background: #cfe3ff;
}

/* =========================
   LOGIN OVERLAY (FIXED)
========================= */

#login {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100dvh;
  background: #2b579a;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  z-index: 9999;
}

/* =========================
   CONTACTS
========================= */

.left {
  width: 280px;
  background: #eaf3ff;
  border-right: 1px solid #2b579a;
  padding: 10px;
  overflow-y: auto;
}

/* =========================
   CHAT
========================= */

.chatBox {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.header {
  background: #2b579a;
  color: white;
  padding: 8px;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  background: #f9fbff;
  min-height: 0;
}

.msg {
  margin: 5px 0;
  padding: 6px;
  max-width: 70%;
  border-radius: 6px;
}

.me { background: #d7ebff; margin-left: auto; }
.other { background: #eee; }

.time {
  font-size: 10px;
  color: #666;
  margin-top: 3px;
}

.input {
  display: flex;
  border-top: 1px solid #ccc;
  flex-shrink: 0;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  font-size: 16px;
}

button {
  padding: 10px;
  background: #2b579a;
  color: white;
  border: none;
}

/* =========================
   MOBILE FIX (HIER ZIT DE OPLOSSING)
========================= */

@media (max-width: 768px) {

  body {
    flex-direction: column;
  }

  .left {
    width: 100%;
    height: 30vh;
    border-right: none;
    border-bottom: 1px solid #2b579a;
  }

  .chatBox {
    height: 70vh;
  }
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>MSN LOGIN</h2>
  <input id="name" placeholder="Username">
  <button onclick="login()">Start</button>
</div>

<!-- CONTACTS -->
<div class="left">
  <h3>Contacts</h3>
  <div id="users"></div>
</div>

<!-- CHAT -->
<div class="chatBox">
  <div class="header" id="header">Select chat</div>
  <div class="chat" id="chat"></div>

  <div class="input">
    <input id="msg" placeholder="Typ..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io("https://buzzimessenger.onrender.com");

let me = null;
let active = null;
let chats = {};

/* LOGIN */
function login() {
  me = document.getElementById("name").value || ("User" + Math.floor(Math.random()*1000));
  document.getElementById("login").style.display = "none";
  socket.emit("register", me);
}

/* USERS */
socket.on("users", (users) => {
  const box = document.getElementById("users");
  box.innerHTML = "";

  Object.entries(users).forEach(([name, data]) => {
    if (name === me) return;

    const div = document.createElement("div");
    div.style.background = "white";
    div.style.margin = "6px 0";
    div.style.padding = "8px";
    div.style.cursor = "pointer";

    div.innerHTML = `<b>${name}</b><br><small>${data.status} - ${data.text}</small>`;

    div.onclick = () => {
      active = name;
      document.getElementById("header").innerText = "Chat met " + name;

      socket.emit("get_history", {
        userA: me,
        userB: name
      });
    };

    box.appendChild(div);
  });
});

/* HISTORY */
socket.on("history", (msgs) => {
  if (!active) return;
  chats[active] = msgs;
  render();
});

/* CHAT */
socket.on("chat_message", (msg) => {
  const other = msg.from === me ? msg.to : msg.from;

  if (!chats[other]) chats[other] = [];
  chats[other].push(msg);

  if (active === other) render();
});

/* SEND */
function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text || !active) return;

  socket.emit("chat_message", {
    from: me,
    to: active,
    text
  });

  input.value = "";
}

/* RENDER */
function render() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  (chats[active] || []).forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + (m.from === me ? "me" : "other");

    const time = new Date(m.time || Date.now()).toLocaleTimeString([], {
      hour: "2-digit",
      minute: "2-digit"
    });

    div.innerHTML = `
      <div>${m.from}: ${m.text}</div>
      <div class="time">${time}</div>
    `;

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
