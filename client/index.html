<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Buzzi Messenger</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma, Arial;
      background: linear-gradient(#cfe3ff, #ffffff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      display: flex;
      width: 700px;
      height: 550px;
      border: 1px solid #2b579a;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      background: white;
    }

    /* CONTACT LIST */
    .contacts {
      width: 200px;
      background: #eaf3ff;
      border-right: 1px solid #2b579a;
      padding: 10px;
    }

    .contact {
      padding: 8px;
      margin-bottom: 6px;
      background: white;
      border: 1px solid #ccc;
      cursor: pointer;
      font-size: 14px;
    }

    .contact:hover {
      background: #d7ebff;
    }

    .online {
      color: green;
      font-size: 12px;
    }

    /* CHAT */
    .chatbox {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #2b579a;
      color: white;
      padding: 10px;
      font-weight: bold;
    }

    .chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #f9fbff;
    }

    .msg {
      margin: 6px 0;
      padding: 6px 10px;
      border-radius: 8px;
      max-width: 75%;
      font-size: 14px;
    }

    .me {
      background: #d7ebff;
      margin-left: auto;
      text-align: right;
    }

    .other {
      background: #eeeeee;
      margin-right: auto;
    }

    .input {
      display: flex;
      border-top: 1px solid #ccc;
    }

    .input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    .input button {
      background: #2b579a;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="app">

  <!-- CONTACT LIST -->
  <div class="contacts">
    <h4>Contacten</h4>

    <div class="contact" onclick="selectUser('Friend 1')">
      Friend 1 <div class="online">🟢 online</div>
    </div>

    <div class="contact" onclick="selectUser('Friend 2')">
      Friend 2 <div class="online">🟢 online</div>
    </div>

    <div class="contact" onclick="selectUser('Friend 3')">
      Friend 3 <div class="online">🟡 away</div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chatbox">

    <div class="header" id="chatHeader">
      💬 Chat met niemand
    </div>

    <div id="chat" class="chat"></div>

    <div class="input">
      <input id="text" placeholder="Typ bericht..." />
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://buzzimessenger.onrender.com");

let currentUser = "Friend 1";

function selectUser(name) {
  currentUser = name;
  document.getElementById("chatHeader").innerText = "💬 Chat met " + name;
  document.getElementById("chat").innerHTML = "";
}

function addMsg(text, type) {
  const chat = document.getElementById("chat");

  chat.innerHTML += `
    <div class="msg ${type}">
      ${text}
      <div style="font-size:10px; opacity:0.6;">
        ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
      </div>
    </div>
  `;

  chat.scrollTop = chat.scrollHeight;
}

/* RECEIVE MESSAGE */
socket.on("message", (data) => {
  addMsg(data.user + ": " + data.text, "other");
});

/* SEND MESSAGE */
function send() {
  const input = document.getElementById("text");
  const msg = input.value.trim();
  if (!msg) return;

  addMsg("Jij: " + msg, "me");

  socket.emit("message", {
    user: "Robbin",
    text: msg,
    to: currentUser
  });

  input.value = "";
}
</script>

</body>
</html>
